<!DOCTYPE html>

<head>

<title>Übungen – Weiterbildung</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #F7F6F2;
    --surface: #FFFFFF;
    --surface2: #F0EFE9;
    --border: #E2E0D8;
    --border2: #CCCAB8;
    --text: #1A1917;
    --text2: #6B6960;
    --text3: #A8A69C;
    --blue: #185FA5;
    --blue-bg: #EAF2FC;
    --blue-dark: #0C447C;
    --green: #2D7A4F;
    --green-bg: #EBF5EE;
    --purple: #534AB7;
    --purple-bg: #EEEDFE;
    --amber: #854F0B;
    --amber-bg: #FEF3E2;
    --teal: #0F6E56;
    --teal-bg: #E3F5EE;
    --gray: #5F5E5A;
    --gray-bg: #F1F0EC;
    --red: #A32D2D;
    --red-bg: #FEF0F0;
    --radius: 10px;
    --radius-sm: 6px;
    --shadow: 0 1px 3px rgba(0,0,0,0.06), 0 1px 2px rgba(0,0,0,0.04);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    padding: 2rem 1rem;
    font-size: 15px;
    line-height: 1.6;
  }

  .app {
    max-width: 720px;
    margin: 0 auto;
  }

  header {
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    margin-bottom: 2rem;
    padding-bottom: 1.5rem;
    border-bottom: 1px solid var(--border);
  }

  .header-left h1 {
    font-size: 26px;
    font-weight: 500;
    letter-spacing: -0.5px;
    color: var(--text);
  }

  .header-left p {
    font-size: 13px;
    color: var(--text3);
    margin-top: 2px;
  }

  .badge {
    background: var(--blue-bg);
    color: var(--blue-dark);
    font-size: 12px;
    font-weight: 500;
    padding: 4px 10px;
    border-radius: 20px;
    margin-top: 4px;
    display: inline-flex;
    align-items: center;
    gap: 5px;
  }

  .badge::before {
    content: '';
    width: 6px; height: 6px;
    background: var(--blue);
    border-radius: 50%;
    animation: pulse 2s ease-in-out infinite;
  }

  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.4; }
  }

  .filters {
    display: flex;
    gap: 6px;
    flex-wrap: wrap;
    margin-bottom: 1rem;
  }

  .fbtn {
    padding: 5px 14px;
    font-size: 13px;
    font-family: 'DM Sans', sans-serif;
    border-radius: 20px;
    border: 1px solid var(--border2);
    background: var(--surface);
    color: var(--text2);
    cursor: pointer;
    transition: all .15s;
    display: flex;
    align-items: center;
    gap: 6px;
  }

  .fbtn:hover { border-color: var(--blue); color: var(--blue); }
  .fbtn.on { background: var(--blue); color: white; border-color: var(--blue); }

  .cdot {
    width: 7px; height: 7px;
    border-radius: 50%;
    display: inline-block;
    flex-shrink: 0;
  }

  .entries { display: flex; flex-direction: column; gap: 8px; margin-bottom: 1.5rem; }

  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    box-shadow: var(--shadow);
    overflow: hidden;
    transition: box-shadow .2s;
  }

  .card:hover { box-shadow: 0 3px 8px rgba(0,0,0,0.09); }
  .card.done .ename { color: var(--text3); text-decoration: line-through; }

  .card-main {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 12px 14px;
  }

  .chk {
    width: 20px; height: 20px;
    border-radius: 5px;
    border: 1.5px solid var(--border2);
    background: transparent;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
    transition: all .15s;
  }

  .chk:hover { border-color: var(--blue); }
  .chk.on { background: var(--blue); border-color: var(--blue); }

  .chk.on::after {
    content: '';
    display: block;
    width: 5px; height: 9px;
    border: 2px solid white;
    border-left: none; border-top: none;
    transform: rotate(45deg) translate(-1px, -1px);
  }

  .pill {
    font-size: 11px;
    font-weight: 500;
    font-family: 'DM Mono', monospace;
    padding: 2px 9px;
    border-radius: 20px;
    white-space: nowrap;
    flex-shrink: 0;
    letter-spacing: 0.02em;
  }

  .ename {
    font-size: 15px;
    color: var(--text);
    flex: 1;
    font-weight: 400;
  }

  .edate {
    font-size: 12px;
    color: var(--text3);
    flex-shrink: 0;
    font-family: 'DM Mono', monospace;
  }

  .icon-btn {
    background: none;
    border: none;
    cursor: pointer;
    color: var(--text3);
    font-size: 13px;
    padding: 4px 8px;
    border-radius: var(--radius-sm);
    transition: all .15s;
    flex-shrink: 0;
    white-space: nowrap;
    font-family: 'DM Sans', sans-serif;
    display: flex; align-items: center; gap: 5px;
  }

  .icon-btn:hover { background: var(--surface2); color: var(--text); }

  .icon-btn.ai {
    color: var(--blue-dark);
    background: var(--blue-bg);
    font-weight: 500;
    font-size: 12px;
  }

  .icon-btn.ai:hover { background: #D4E8F8; }
  .icon-btn.ai:disabled { opacity: 0.5; cursor: default; background: var(--surface2); color: var(--text3); }
  .icon-btn.del:hover { color: var(--red); background: var(--red-bg); }

  .sub {
    display: none;
    border-top: 1px solid var(--border);
    background: var(--surface2);
  }

  .sub.open { display: block; }

  .sub-inner { padding: 12px 14px 14px 44px; }

  .sub textarea {
    width: 100%;
    font-size: 13px;
    font-family: 'DM Sans', sans-serif;
    padding: 10px 12px;
    border: 1px solid var(--border2);
    border-radius: var(--radius-sm);
    background: var(--surface);
    color: var(--text);
    resize: vertical;
    min-height: 80px;
    outline: none;
    line-height: 1.7;
    transition: border-color .15s;
  }

  .sub textarea:focus { border-color: var(--blue); }

  .loading-row {
    display: none;
    align-items: center;
    gap: 8px;
    font-size: 13px;
    color: var(--text2);
    padding: 8px 0;
  }

  .loading-row.show { display: flex; }

  .spin {
    width: 14px; height: 14px;
    border: 2px solid var(--border2);
    border-top-color: var(--blue);
    border-radius: 50%;
    animation: spin .7s linear infinite;
    flex-shrink: 0;
  }

  @keyframes spin { to { transform: rotate(360deg); } }

  .add-section {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    box-shadow: var(--shadow);
    padding: 1.25rem;
  }

  .add-section h3 {
    font-size: 14px;
    font-weight: 500;
    color: var(--text2);
    margin-bottom: 10px;
    text-transform: uppercase;
    letter-spacing: 0.06em;
    font-size: 11px;
  }

  .add-row { display: flex; gap: 8px; margin-bottom: 8px; }

  .add-row input, .add-row select {
    font-family: 'DM Sans', sans-serif;
    font-size: 14px;
    padding: 9px 12px;
    border: 1px solid var(--border2);
    border-radius: var(--radius-sm);
    background: var(--bg);
    color: var(--text);
    outline: none;
    transition: border-color .15s;
  }

  .add-row input { flex: 1; }
  .add-row input:focus, .add-row select:focus { border-color: var(--blue); background: white; }

  .add-note {
    width: 100%;
    font-family: 'DM Sans', sans-serif;
    font-size: 13px;
    padding: 9px 12px;
    border: 1px solid var(--border2);
    border-radius: var(--radius-sm);
    background: var(--bg);
    color: var(--text);
    outline: none;
    margin-bottom: 10px;
    transition: border-color .15s;
  }

  .add-note:focus { border-color: var(--blue); background: white; }

  .add-btn {
    width: 100%;
    padding: 10px;
    font-size: 14px;
    font-weight: 500;
    font-family: 'DM Sans', sans-serif;
    background: var(--blue);
    color: white;
    border: none;
    border-radius: var(--radius-sm);
    cursor: pointer;
    transition: background .15s;
    letter-spacing: 0.01em;
  }

  .add-btn:hover { background: var(--blue-dark); }

  .empty {
    text-align: center;
    padding: 2rem;
    color: var(--text3);
    font-size: 14px;
  }

  .result-text {
    font-size: 13px;
    color: var(--text);
    line-height: 1.8;
    white-space: pre-wrap;
    word-break: break-word;
    margin-top: 8px;
  }

  footer {
    text-align: center;
    margin-top: 2.5rem;
    font-size: 12px;
    color: var(--text3);
    font-family: 'DM Mono', monospace;
  }
</style>
</head>

var CATS = [

var entries = [
  { id:1, name:"Analogien Algorithmus", cat:"algo", done:false, date:"30.03.2026", note:"", open:false, generated:false },
  { id:2, name:"MYCIN – Algorithmus ja oder nein?", cat:"algo", done:false, date:"30.03.2026", note:"Antwort: Ja – MYCIN ist ein Algorithmus, genauer gesagt ein regelbasierter Entscheidungsalgorithmus.\n\nEin Algorithmus ist eine endliche, eindeutige Folge von Anweisungen, die ein Problem schrittweise löst. MYCIN folgt genau diesem Prinzip: Es wertet Symptome und Labordaten nach fest definierten Wenn-Dann-Regeln aus (z.B. \"Wenn Bakterientyp X vorliegt UND Merkmal Y zutrifft, dann empfehle Antibiotikum Z\"). Die Schritte sind deterministisch, wiederholbar und führen zu einem definierten Ergebnis. Das System terminiert nach der Auswertung aller relevanten Regeln mit einer konkreten Behandlungsempfehlung. Damit erfüllt MYCIN alle klassischen Kriterien eines Algorithmus – auch wenn er durch seine Komplexität eher als \"Expertensystem\" bezeichnet wird.", open:true, generated:false },
  { id:3, name:"Bist wirklich Du das? – Gesichtserkennung & neuronale Netze", cat:"algo", done:false, date:"30.03.2026", note:"Perspektive eines neuronalen Netzes:\n\nWenn ich als neuronales Netz eine Person mit Sonnenbrille oder Maske erkenne, fehlen mir entscheidende Merkmalsbereiche, auf die ich trainiert wurde: Augenpartie, Nasenrücken, Mundform. Meine Neuronen haben gelernt, Gesichter als Gesamtmuster zu gewichten – fällt ein großer Teil davon weg, sinkt meine Konfidenz unter den Schwellenwert und ich verweigere den Zugang.\n\nWarum es trotzdem manchmal klappt: Das Netz erkennt andere stabile Muster – Gesichtskontur, Stirnform, Augenabstand (bei Sonnenbrille noch sichtbar), Hautton, Haaransatz oder die Art, wie jemand den Kopf hält. Wenn diese Restmuster stark genug mit dem gespeicherten Profil übereinstimmen, reicht die Gesamtwahrscheinlichkeit aus.\n\nFehlende Informationen bei Maske: Mund, Nase, Wangen, Kinnpartie – oft 40–60 % der trainierten Merkmale.\n\nTrotzdem erkannte Muster: Augenabstand, Stirn, Schläfenbereich, Ohrform, allgemeine Gesichtsgeometrie – reicht bei gut trainierten Netzen oft noch aus, besonders wenn Trainingsdaten auch maskierte Gesichter enthielten.", open:true, generated:false },
  { id:4, name:"Halluzinationen bei LLMs", cat:"digital", done:false, date:"30.03.2026", note:"Definition: Eine Halluzination bei einem LLM bezeichnet eine Ausgabe, die faktisch falsch, erfunden oder nicht durch die Trainingsdaten belegbar ist – aber vom Modell mit hoher Überzeugung als korrekt präsentiert wird. Das Modell lügt nicht absichtlich, es generiert schlicht die wahrscheinlichste nächste Wortfolge – ohne ein echtes Wahrheitsverständnis.\n\nEntstehungsgründe:\n- LLMs lernen statistische Muster in Sprache, keine verifizierten Fakten\n- Bei seltenen oder widersprüchlichen Trainingsdaten interpoliert das Modell – es füllt Lücken mit plausibel klingenden, aber falschen Inhalten\n- Das Modell hat keinen Mechanismus, um zu erkennen, was es nicht weiß – es antwortet trotzdem\n- Zu hohe Temperatur (Kreativitätsparameter) erhöht die Halluzinationsrate\n\nBeispiele:\n- Erfundene Gerichtsurteile mit korrektem Aktenzeichen-Format aber falschem Inhalt\n- Biografien realer Personen mit erfundenen Lebensstationen\n- Quellenangaben zu Büchern oder Studien, die nicht existieren\n- Falsche Jahreszahlen bei historischen Ereignissen\n\nWie man Halluzinationen erkennt:\n- Fakten aus LLM-Ausgaben immer mit verlässlichen Quellen gegenprüfen\n- Misstrauen bei sehr spezifischen Angaben (Zahlen, Daten, Namen, Zitate)\n- Bei Unsicherheit das Modell direkt fragen: Bist du sicher? Welche Quellen hast du dafür?\n- Ausgaben verschiedener Modelle vergleichen\n\nVorsichtsmaßnahmen:\n- LLMs nie als alleinige Informationsquelle nutzen, besonders bei fachkritischen Themen\n- Eigenes Fachwissen als Korrektiv einsetzen – je mehr man weiß, desto schneller fällt eine Halluzination auf\n- Bei sensiblen Bereichen (Recht, Medizin, Finanzen) immer Experten hinzuziehen\n- Outputs dokumentieren und nachvollziehbar halten", open:true, generated:false },
  { id:5, name:"Trend-Recherche: Projektmanagement & Jobaussichten Düsseldorf 2026", cat:"pm", done:false, date:"30.03.2026", note:"MARKTLAGE\nÜber 160 offene Stellen auf Indeed, ~1.000 auf LinkedIn im Großraum Düsseldorf/NRW (Stand März 2026). Die Nachfrage ist hoch und wächst weiter.\n\nTOP-BRANCHEN IN DÜSSELDORF:\n- Banken & Versicherungen (z.B. Commerzbank, Deutsche Apotheker- und Ärztebank)\n- Telekommunikation & Glasfaser (OXG, Deutsche Glasfaser)\n- Energie & IT-Dienstleistungen\n- Öffentlicher Sektor & Beratung\n\nGEHALT (brutto/Jahr):\n- Projektmanager Einstieg: ~50.000 €\n- Projektmanager erfahren: ~65.000 €\n- IT-Projektmanager erfahren: ~60.000–88.000 €\n- Scrum Master Düsseldorf Einstieg: ~59.600 €\n- Scrum Master Düsseldorf Median: ~82.000 €\n- Scrum Master Düsseldorf Senior: bis ~104.700 €\n- Leiter/in Projektmanagement Ø: ~82.800 €\n\nGEFRAGTE SKILLS:\n- Agile Methoden: Scrum, Kanban, SAFe\n- Zertifikate: PSM I/II, PMP, PRINCE2, IPMA\n- Tools: Jira, MS Project, Excel, PowerPoint, Power BI\n- Soft Skills: Kommunikation, Stakeholdermanagement, Teamführung\n- Trendthemen: KI-Anwendungen, Prozessautomatisierung, hybrides PM\n\nKARRIEREPFAD:\nEinstieg → PMO / Teilprojektkoordination → Projektmanager → Senior PM → Programm-/Projektleitung\n\nFAZIT: Sehr gute Aussichten in Düsseldorf. Mit PSM-Zertifikat und Scrum-Kenntnissen aus der ChapterNext-Weiterbildung liegt man genau im gefragten Profil.", open:true, generated:false },
  { id:6, name:"GPT Canvas vs. Claude Artifacts – KI-Tool-Vergleich", cat:"digital", done:false, date:"30.03.2026", note:"Das Modul KI geht nur auf ChatGPT/OpenAI ein – hier die Ergänzung aus Claude-Perspektive:\n\nClaude's Äquivalent zu GPT Canvas heißt 'Artifacts'.\n\nBEIDE TOOLS: Separater Arbeitsbereich neben dem Chat für Dokumente, Code und Inhalte.\n\nVERGLEICH:\n- Dokumente schreiben & bearbeiten: beide ✓\n- Code schreiben & ausführen: beide ✓\n- Direkte Inline-Bearbeitung im Panel: beide ✓\n- Interaktive HTML/React-Widgets: nur Claude Artifacts ✓\n- SVG-Visualisierungen & Diagramme: Claude deutlich stärker\n- Zielgruppe: Canvas eher Texte & Code / Artifacts breiter inkl. interaktive Apps\n\nGRÖSSTER UNTERSCHIED:\nClaude Artifacts können vollständig interaktive Anwendungen sein (z.B. der Übungsordner als HTML-App). Das geht mit Canvas so nicht.\n\nPRAXISBEISPIEL AUS DIESER WEITERBILDUNG:\nDer KI-gestützte Übungsordner (uebungen-ordner.html) ist ein Claude Artifact – eine vollständige interaktive Web-App, die direkt im Chat gebaut und als Datei exportiert wurde.", open:true, generated:false },
  { id:7, name:"Praxisübung: Software-Prototyp mit Claude Artifacts", cat:"digital", done:false, date:"30.03.2026", note:"AUFGABE AUS DEM MODUL:\nEin kleines Tool entwickeln, das repetitive PC-Aufgaben erleichtert. Das Modul empfahl Canvas (GPT) – hier wurde stattdessen Claude Artifacts genutzt.\n\nUMGESETZTER PROTOTYP: Meeting-Notizen Tool (meeting-notizen.html)\n\nFUNKTIONEN:\n- Meetings anlegen mit Titel, Datum, Uhrzeit, Ort, Teilnehmer\n- Ziel, Agenda, Notizen & Entscheidungen dokumentieren\n- Action Items mit Zuständigen hinzufügen & abhaken\n- Fertiges Protokoll per Klick in Zwischenablage kopieren\n- Druckfunktion für physische Ablage\n- Statusübersicht: offene/abgeschlossene Meetings & Action Items\n\nWAS DIESER PROTOTYP ZEIGT:\n- Claude Artifacts können vollständige interaktive Web-Apps erzeugen\n- Kein Programmier-Vorwissen nötig – natürlichsprachige Beschreibung reicht\n- Ergebnis ist eine echte, lokal nutzbare HTML-Datei\n- Vorteil gegenüber Canvas: reichhaltigere Interaktivität möglich\n\nLERNEFFEKT:\nKI als Entwicklungspartner für eigene Alltagstools – ohne Code schreiben zu können.", open:false, generated:false },
  { id:8, name:"Projekte anlegen in Claude", cat:"digital", done:true, date:"30.03.2026", note:"SELBSTEINSCHÄTZUNG: Bereits beherrscht ✓\n\nWas in diesem Modul behandelt wird:\n- Projekte in Claude.ai anlegen und benennen\n- Wissensbasis / Projektdateien hochladen\n- Kontext über mehrere Gespräche hinweg nutzen\n- Projekt-Einstellungen & Systemanweisungen\n\nPraxisnachweis aus dieser Weiterbildung:\nDieser gesamte Übungsordner wurde im Rahmen eines Claude-Projekts erarbeitet. Mehrere HTML-Tools wurden erstellt, Übungen dokumentiert und iterativ weiterentwickelt – alles innerhalb eines strukturierten Projektkontexts.\n\nFAZIT: Kompetenz nachgewiesen durch aktive Anwendung.", open:false, generated:false },
  { id:9, name:"Customizing: PM-Vokabular Modus & Add-ons", cat:"digital", done:true, date:"30.03.2026", note:"MODULINHALT: Customizing von KI-Tools\n\nWAS CUSTOMIZING BEDEUTET:\nEinen KI-Assistenten durch gezielte Anweisungen dauerhaft auf eigene Bedürfnisse anpassen – ohne jedes Mal neu erklären zu müssen.\n\nZWEI WEGE IN CLAUDE:\n1. Projektanweisung (System Prompt) in den Projekteinstellungen\n   → gilt dauerhaft für ALLE Gespräche im Projekt\n   → einmal einrichten, immer aktiv\n2. Direkt im Chat\n   → gilt nur für das aktuelle Gespräch\n\nAKTIVIERTE ANPASSUNG (ab 30.03.2026):\nPM-Vokabular Modus: PM- und Scrum-Begriffe werden fett hervorgehoben und beim ersten Vorkommen kurz erklärt – zur Festigung des Fachvokabulars.\n\nEMPFOHLENE ADD-ONS FÜR DIE FORTBILDUNG:\n- PM-Vokabular Modus (aktiv) ✓\n- Flashcard-Generator nach jeder Übung\n- Lernfortschritt-Karte (Modulübersicht)\n- Bewerbungs-Coach (Inhalte → CV-Sprache)\n- Wöchentliches Wiederholungs-Quiz\n- Modul-Verknüpfer (Zusammenhänge visualisieren)\n\nEMPFEHLUNG FÜR PROJEKTANWEISUNG:\n'Führe alle Gespräche so, dass PM- und Scrum-Begriffe fett hervorgehoben und beim ersten Vorkommen kurz erklärt werden. Nutze das Vokabular aktiv, um das Fachvokabular zu festigen.'\n\nFAZIT: Customizing = eigener System Prompt → KI arbeitet dauerhaft im gewünschten Stil.", open:false, generated:false },
  { id:10, name:"KI-Ethik & Verantwortung", cat:"digital", done:true, date:"30.03.2026", note:"MODULINHALT: Ethik und Verantwortung im KI-Einsatz\n\nKERNTHEMEN:\n\n1. BIAS (= systematische Verzerrung durch Trainingsdaten)\n   → KI-Modelle können Vorurteile aus Trainingsdaten übernehmen\n   → Relevant bei: Personalentscheidungen, Kreditvergabe, Gesichtserkennung\n   → Verantwortung: Menschen müssen KI-Entscheidungen prüfen und hinterfragen\n\n2. TRANSPARENZ\n   → Wer im Stakeholder-Kreis weiß, dass KI beteiligt war?\n   → Kennzeichnungspflicht von KI-generierten Inhalten (EU AI Act)\n   → Im Projektmanagement: offene Kommunikation über KI-Einsatz im Team\n\n3. VERANTWORTUNG & HAFTUNG\n   → Wer haftet bei Fehlern eines KI-gestützten Projektergebnisses?\n   → KI kann nicht zur Rechenschaft gezogen werden – Menschen schon\n   → Wichtig: KI als Werkzeug, nicht als Entscheidungsträger\n\n4. DATENSCHUTZ & DSGVO\n   → Keine personenbezogenen Daten in KI-Tools eingeben ohne Prüfung\n   → DSGVO-Konformität beim Einsatz von KI im Projektteam beachten\n\nFAZIT: Als Scrum Master / Projektmanagerin zunehmend gefragt, KI-Einsatz nicht nur nach Effizienz, sondern auch nach Ethik und Nachhaltigkeit zu bewerten.", open:false, generated:false },
  { id:11, name:"Digital Literacy 2.0: Ressourcenverbrauch & Nachhaltigkeit von KI", cat:"digital", done:true, date:"30.03.2026", note:"MODULINHALT: Digitale Verantwortung & ökologischer Fußabdruck von KI\n\nERNÜCHTERNDE FAKTEN:\n- Eine LLM-Anfrage verbraucht ~10x mehr Energie als eine Google-Suche\n- Bei Milliarden täglicher Anfragen → Stromverbrauch ganzer Länder\n- Microsoft, Google & Amazon haben bereits Verträge mit Atomkraftwerken\n- Three Mile Island (USA) wurde 2024 für KI-Stromversorgung reaktiviert\n\nDAS ETHISCHE DILEMMA:\nKI ermöglicht enorme Effizienzgewinne (z.B. in Ressourcenplanung, Risikomanagement)\n– schafft aber gleichzeitig gigantischen neuen Ressourcenbedarf.\nFrage: Wann ist der ROI eines KI-Einsatzes wirklich positiv, wenn man den ökologischen Fußabdruck einrechnet?\n\nRELEVANZ FÜR PM & SCRUM:\n- Als Projektmanagerin/Scrum Master: KI-Einsatz nicht nur nach Effizienz bewerten\n- Nachhaltigkeitsaspekte gehören in die Risikoanalyse\n- Digitale Verantwortung = Teil moderner Führungskompetenz\n- Frage im Team: Welche Prozesse wirklich automatisieren – und welche nicht?\n\nPERSÖNLICHE REFLEXION:\nTech-Giganten mit eigenen Atomkraftwerken – das wirft grundlegende Fragen\nüber Kontrollverlust, Machtkonzentration und gesellschaftliche Verantwortung auf.\n\nFAZIT: Digital Literacy 2.0 bedeutet nicht nur KI nutzen können,\nsondern ihre gesellschaftlichen und ökologischen Auswirkungen kritisch einordnen.", open:true, generated:false },
  { id:12, name:"Multiprojektmanagement: Herausforderungen & Bewältigungsmaßnahmen", cat:"pm", done:false, date:"01.04.2026", note:"DEFINITION:\nMultiprojektmanagement = gleichzeitige Steuerung mehrerer Projekte, die um dieselben Ressourcen (Personal, Budget, Zeit) konkurrieren.\n\nHERAUSFORDERUNGEN & MASSNAHMEN:\n\n1. RESSOURCENKONFLIKTE\nHerausforderung: Dieselben Mitarbeitenden werden in mehreren Projekten gleichzeitig eingeplant → Überlastung, Engpässe, Qualitätsverlust.\nMaßnahme: Ressourcenplanung über alle Projekte hinweg (z.B. Kapazitätsmatrix), klare Priorisierung welches Projekt Vorrang hat, ggf. Ressourcenpuffer einplanen.\n\n2. PRIORITÄTSKONFLIKTE\nHerausforderung: Welches Projekt ist wichtiger? Projektleiter konkurrieren um Aufmerksamkeit und Entscheidungen des Managements.\nMaßnahme: Einheitliche Priorisierungsmethode (z.B. Eisenhower-Prinzip, Scoring-Modell), zentrale Entscheidungsinstanz (PMO), transparente Kommunikation.\n\n3. FEHLENDE ÜBERSICHT / INTRANSPARENZ\nHerausforderung: Bei vielen parallelen Projekten verliert man den Überblick über Status, Abhängigkeiten und Fortschritt.\nMaßnahme: Zentrales Projektportfolio-Dashboard, einheitliche Statusberichte (Ampelsystem: grün/gelb/rot), regelmäßige Portfolio-Reviews.\n\n4. ABHÄNGIGKEITEN ZWISCHEN PROJEKTEN\nHerausforderung: Ein Verzug in Projekt A blockiert den Start oder Fortschritt von Projekt B.\nMaßnahme: Abhängigkeiten frühzeitig im Projektplan erfassen, Pufferzeiten einplanen, Kommunikation zwischen Projektleitungen sicherstellen.\n\n5. KOMMUNIKATIONSAUFWAND\nHerausforderung: Mit steigender Projektanzahl steigt der Koordinationsaufwand exponentiell – Meetings, Berichte, Abstimmungen.\nMaßnahme: Standardisierte Reporting-Formate, feste Rhythmen (z.B. wöchentliche Portfolio-Runde), klare Eskalationswege.\n\n6. SCOPE CREEP AUF PORTFOLIO-EBENE\nHerausforderung: Ständig neue Projekte werden gestartet, ohne dass bestehende abgeschlossen oder gestoppt werden.\nMaßnahme: Formaler Projektaufnahme-Prozess (Business Case, Priorisierung), Stopp-Kriterien definieren, PMO als Torwächter.\n\n7. MULTITASKING-FALLE\nHerausforderung: Ständiges Kontextwechseln zwischen Projekten kostet Energie und senkt die Qualität.\nMaßnahme: Fokuszeiten schützen, Aufgaben bündeln, klare Tagesstruktur – Eisenhower-Prinzip auf persönlicher Ebene.\n\nWISSENSDANKBANK-BEISPIEL:\nEin Unternehmen mit 500 Mitarbeitern startet gleichzeitig: Wissensdatenbank, CRM-Einführung und Büroumzug. Alle drei brauchen die IT-Abteilung. Ohne Multiprojektmanagement kollabiert die IT. Mit zentraler Ressourcenplanung und PMO werden Kapazitäten sichtbar und fair verteilt.", open:true, generated:false },
  { id:13, name:"PMO – Project Management Office", cat:"pm", done:false, date:"01.04.2026", note:"DEFINITION:\nPMO (Project Management Office) = zentrale Organisationseinheit, die Projektmanagement-Standards, -Methoden und -Ressourcen im Unternehmen koordiniert und überwacht.\n\nAUFGABEN EINES PMO:\n1. Standards & Methoden: Einheitliche PM-Methoden, Templates, Tools für alle Projekte definieren\n2. Portfolioübersicht: Alle laufenden Projekte im Blick behalten – Status, Ressourcen, Risiken\n3. Ressourcenkoordination: Konflikte bei der Ressourcenverteilung zwischen Projekten lösen\n4. Priorisierung: Entscheidungsgrundlagen für das Management bereitstellen\n5. Reporting: Standardisierte Statusberichte für die Unternehmensführung\n6. Wissensmanagement: Lessons Learned dokumentieren und weitergeben\n7. Coaching: Projektleiter unterstützen und weiterentwickeln\n\nTYPEN VON PMO:\n- Unterstützendes PMO: berät und stellt Vorlagen bereit (wenig Einfluss)\n- Kontrollierendes PMO: gibt Standards vor und überwacht deren Einhaltung\n- Führendes PMO: übernimmt direkte Projektverantwortung (starker Einfluss)\n\nVORTEILE:\n- Einheitliche Qualitätsstandards über alle Projekte\n- Transparenz auf Portfolio-Ebene\n- Weniger Doppelarbeit durch geteiltes Wissen\n- Klare Anlaufstelle für PM-Fragen\n\nRISIKEN:\n- Bürokratieaufwand wenn zu starr\n- Akzeptanzprobleme bei Projektleitern\n- Hohe Einführungskosten\n\nWISSENSDANKBANK-BEISPIEL:\nDas PMO des 500-Personen-Unternehmens entscheidet: Die Wissensdatenbank hat höchste Priorität, weil sie alle anderen Projekte langfristig unterstützt. CRM und Umzug werden zeitlich gestaffelt. Die IT bekommt einen festen Kapazitätsplan – kein Projekt kann mehr unkontrolliert auf ihre Ressourcen zugreifen.\n\nROLLEN IM PMO (Idealmodell):\n- PMO-Leiter: strategische Ausrichtung und Koordination aller Aktivitäten\n- Projektportfoliomanager: Bewertung nach Strategie, Ressourcen, Risiken, Finanzen\n- Programmmanager: koordiniert mehrere zusammenhängende Projekte (übergeordnet)\n- Projektmanager: Ausarbeitung, Durchführung und Steuerung einzelner Projekte\n- Ressourcenmanager: Kapazitäten, Planung und Zuweisung der Ressourcen\n- Projektcontroller: überwacht Fortschritt und Finanzen, dokumentiert in Projektaudits\n- Risikomanager: identifiziert, analysiert und bewertet potenzielle Hindernisse\n- Qualitätsmanager: konzipiert und implementiert Qualitätsstandards\n- Kommunikationsmanager: interne/externe Kommunikation und Stakeholder-Management\n- Wissensmanager: sammelt und organisiert Erfahrungen (Lessons Learned)\n- Schulungs- und Entwicklungsmanager: Weiterbildung für PM-Mitarbeitende\n- Administrativer Unterstützungsbereich: Terminplanung, Dokumentenorganisation, Reporting\n\nPRAXISHINWEIS – IDEALMODELL VS. REALITÄT:\nDiese Rollen sind als Maximalmodell zu verstehen, nicht als feste Stellenbeschreibungen.\n- Kleine Unternehmen (bis ~100 MA): oft kein formales PMO – eine Person trägt mehrere Hüte\n- Mittelgroße Unternehmen (100–500 MA): PMO als kleine Einheit (2–5 Personen), Rollen gebündelt\n- Großkonzerne: alle Rollen können eigenständige Vollzeitstellen mit eigenen Teams sein\nDie Kernfunktionen Projektsteuerung, Ressourcenplanung und Reporting sind immer vorhanden – nur die Form variiert.", open:true, generated:false },
  { id:14, name:"Milestones & Deliverables", cat:"pm", done:true, date:"01.04.2026", note:"BEGRIFFE:\nMilestone (Meilenstein) = definierter Zeitpunkt im Projektverlauf, an dem ein wichtiges Zwischenziel erreicht sein muss. Hat kein Gewicht, keine Seiten – markiert: 'Bis hier sind wir.'\nDeliverable (Lieferobjekt) = konkretes, messbares Ergebnis, das zu einem bestimmten Zeitpunkt übergeben, geprüft und abgenommen werden kann.\n\nDER UNTERSCHIED AUF DEN PUNKT:\nJeder Milestone hat mindestens ein Deliverable, das beweist, dass er wirklich erreicht wurde.\nOhne Deliverable bleibt ein Milestone vage – 'Konzept fertig' ist nicht überprüfbar.\nMit Deliverable wird daraus: 'Genehmigtes 12-seitiges Konzeptdokument, abgezeichnet vom Auftraggeber.' – das ist nachweisbarer Fortschritt.\n\nBEISPIEL: IMPLEMENTIERUNG WISSENSDATENBANK (500 Mitarbeiter)\n\nMilestone 1: Projektfreigabe (Ende Woche 2)\nDeliverable: Genehmigtes Projektdefinitionsdokument + unterschriebener Business Case\n\nMilestone 2: Anforderungen abgeschlossen (Ende Woche 4)\nDeliverable: Anforderungskatalog aus Interviews mit Abteilungsleitern und Mitarbeitern\n\nMilestone 3: Systemauswahl getroffen (Ende Woche 6)\nDeliverable: Evaluationsbericht (Vergleich z.B. Confluence, SharePoint, Notion) + Entscheidungsvorlage für das Management\n\nMilestone 4: Pilotbetrieb gestartet (Ende Woche 10)\nDeliverable: Lauffähiges System mit Testinhalten für Pilotgruppe (20 MA) + Testprotokoll\n\nMilestone 5: Schulungen abgeschlossen (Ende Woche 14)\nDeliverable: Schulungsmaterial (Handbuch + Video-Tutorials) + Teilnahmenachweise aller Abteilungen\n\nMilestone 6: Go-Live (Ende Woche 16)\nDeliverable: Produktivsystem für alle 500 Mitarbeiter + Übergabedokumentation an den Betrieb\n\nMilestone 7: Projektabschluss (Ende Woche 18)\nDeliverable: Abschlussbericht (Ergebnisse, Abweichungen, Lessons Learned) + freigegebenes System im Regelbetrieb\n\nFAZIT: Milestones strukturieren den Zeitplan – Deliverables machen Fortschritt messbar und nachweisbar.\n\nDELIVERABLES IN DER PROJEKTPRAXIS – 5 BEREICHE:\n\n01 FORTSCHRITTSMESSUNG\nDeliverables: Fortschrittsberichte, Projektstatusupdates\nEingesetzte Mittel: Projektmanagement-Software, Zeiterfassungstools\n\n02 ÜBERWACHUNG DES PROJEKTSTATUS\nDeliverables: Projektstatusberichte, Abweichungsanalysen\nEingesetzte Mittel: Projektmanagement-Software, Kommunikationstools, Risikomanagement-Tools\n\n03 KOMMUNIKATION MIT STAKEHOLDERN\nDeliverables: Stakeholder-Kommunikationsplan\nEingesetzte Mittel: Kommunikationstools, Präsentationsmaterial, Stakeholder-Analyse-Tools\n\n04 MOTIVATION UND ERFOLGSERLEBNISSE\nDeliverables: Anerkennung, Belohnungssysteme, Team-Meetings\nEingesetzte Mittel: Motivations- und Belohnungsprogramme, Team-Building-Aktivitäten, Kommunikationstools\n\n05 RISIKOMANAGEMENT\nDeliverables: Risikobewertungen, Risikomanagementplan, Risikoreduktionsstrategien\nEingesetzte Mittel: Risikoanalyse-Tools, Risikomanagement-Software, Szenario-Planungstools", open:true, generated:false },
  { id:15, name:"Projektabschluss & Nachbereitung", cat:"pm", done:true, date:"01.04.2026", note:"PROJEKTABSCHLUSS – 5 SCHRITTE (Kursinhalt):\n01 Überprüfung der erreichten Projektziele und des Projektumfangs\n02 Abnahme des Projektergebnisses durch den Kunden oder die Stakeholder\n03 Übertragung des Projektergebnisses an den Kunden oder die Nutzer\n04 Freigabe von Ressourcen und Teammitgliedern für andere Projekte oder Aufgaben\n05 Abschluss der Verträge und finanziellen Angelegenheiten\n\nNACHBEREITUNG – 9 SCHRITTE (Kursinhalt):\n01 Erstellung eines Abschlussberichts (Projektverlauf, erreichte Ziele, Lessons Learned, Empfehlungen)\n02 Archivierung aller relevanten Projektunterlagen (Verträge, Berichte, Kommunikation, Dokumente)\n03 Bewertung des Projektverlaufs, der Leistung und der Zielerreichung\n04 Identifizierung von Stärken, Schwächen, Erfolgsfaktoren und Verbesserungspotenzialen\n05 Durchführung einer Lessons Learned-Sitzung – wichtige Erkenntnisse und Best Practices für zukünftige Projekte\n06 Würdigung der Teammitglieder und ihrer Leistungen + Feier der erreichten Ziele\n07 Übertragung von Wissen und Erfahrungen an andere Teams oder das Projektmanagement\n08 Sammlung von Feedback von Kunden, Stakeholdern und Teammitgliedern\n09 Bewertung der Kundenzufriedenheit und des Projekterfolgs – Überprüfung der Kosten und des Budgets im Vergleich zur tatsächlichen Leistung\n\nWARUM DER ABSCHLUSS OFT SCHEITERT:\nDas System läuft, alle sind erleichtert – das Team löst sich auf ohne formalen Abschluss. Ergebnis: keine Dokumentation, keine Lessons Learned, beim nächsten ähnlichen Projekt werden dieselben Fehler wiederholt.\nIn Scrum gibt es dafür die Sprint Retrospective (regelmäßige Reflexion des Arbeitsprozesses) – dasselbe Prinzip, nur kontinuierlich statt einmalig.\n\nWISSENSDANKBANK-BEISPIEL:\nAbschluss: IT-Leitung und Geschäftsführung unterzeichnen Abnahmeprotokoll. Betriebshandbuch an IT, Redaktionsleitfaden an Content-Verantwortliche, Admin-Zugänge dokumentiert. Zwei Teammitglieder starten direkt ins CRM-Projekt.\nNachbereitung: Lessons Learned-Sitzung ergibt – Scope hätte in Woche 1 schärfer definiert werden müssen, Stakeholder aus dem Vertrieb wurden zu spät eingebunden. Beides wird im Abschlussbericht dokumentiert und an das PMO übergeben.\n\nWISSENSÜBERTRAGUNG (Schritt 07):\nDefinition: Wissen und Erfahrungen aus dem Projekt werden dokumentiert, präsentiert und für andere nutzbar gemacht – ohne spezielle Fachkenntnisse umsetzbar, wenn Informationen klar und verständlich vermittelt werden.\nMaßnahmen am Beispiel Wissensdatenbank:\n- Abschlussbericht ins PMO-Archiv – für alle künftigen Projektleiter zugänglich\n- Präsentation der Lessons Learned im monatlichen PM-Meeting\n- Schulungsunterlagen und Redaktionsleitfaden als Vorlagen für ähnliche Projekte hinterlegt\n- Erfahrungsbericht des Projektteams im internen Intranet veröffentlicht\n- Einweisung des CRM-Projektteams: 'Diese Fehler haben wir gemacht – vermeidet sie'\n\nFEEDBACK-OPTIONEN (Schritt 08):\nZiel: Qualität und Zufriedenheit objektiv messen – nicht nur intern bewerten.\n\nFeedback von Mitarbeitern (Nutzer der Wissensdatenbank):\n- Online-Umfrage 4 Wochen nach Go-Live (Zufriedenheit, Usability, fehlende Inhalte)\n- Auswertung der Suchanfragen: Welche Themen werden gesucht aber nicht gefunden?\n- Offene Feedback-Box im System selbst\n\nFeedback von Stakeholdern (Abteilungsleiter, Auftraggeber):\n- Einzelgespräche oder strukturiertes Interview\n- Fragen: Wurden die Projektziele erreicht? Was hätten Sie sich anders gewünscht?\n- Soll-Ist-Vergleich gemeinsam durchgehen\n\nFeedback vom Projektteam:\n- Anonyme Teamumfrage (psychologische Sicherheit)\n- Fragen: Wie war die Zusammenarbeit? Wo fehlte Unterstützung? Was lief reibungslos?\n- Ergebnisse fließen direkt in die Lessons Learned ein\n\nFAZIT ÜBERTRAGUNG & FEEDBACK:\nBeides zusammen schließt den Wissenskreislauf: Was im Projekt gelernt wurde, wird gesichert (Übertragung) und von außen bewertet (Feedback) – so wird jedes Projekt zur Grundlage für das nächste.", open:true, generated:false },
  { id:16, name:"Lessons Learned Analyse: Wissensdatenbank", cat:"pm", done:true, date:"01.04.2026", note:"STÄRKEN:\n- Klare Zieldefinition zu Projektbeginn – alle 500 MA als Zielgruppe von Anfang an kommuniziert\n- Pilotbetrieb mit 20 MA hat Fehler früh sichtbar gemacht, bevor Go-Live\n- Schulungsmaterial gut angenommen – Teilnahmequote über 90 %\n- PMO-Unterstützung hat Ressourcenkonflikte mit CRM-Projekt verhindert\n- Go-Live termingerecht in Woche 16 – kein Zeitverzug\n\nSCHWÄCHEN:\n- Scope zu Beginn nicht scharf genug – KI-Suchfunktion nachträglich gewünscht (Scope Creep)\n- Vertrieb zu spät als Stakeholder eingebunden – Anforderungen nachträglich ergänzt\n- Anforderungskatalog in Woche 4 zu knapp – Nacharbeiten nötig\n- IT-Kapazität in Woche 8–10 zu eng – Pilotstart um eine Woche verschoben\n- Keine klare Regelung für Content-Pflege nach Go-Live vereinbart\n\nERFOLGSFAKTOREN:\n- Frühe Einbindung der IT-Abteilung in die Planung\n- Klare Milestone-Struktur mit nachweisbaren Deliverables\n- Aktive Unterstützung durch Geschäftsführung – Projekt hatte hohe Priorität im PMO\n- Pilotgruppe aus verschiedenen Abteilungen – repräsentatives Feedback\n- Kommunikationsplan hat alle Stakeholder regelmäßig informiert\n\nVERBESSERUNGSPOTENZIALE:\n- Scope-Definition mit Change-Request-Prozess absichern\n- Stakeholder-Analyse in Woche 1, nicht erst Woche 3\n- IT-Kapazitäten für parallele Projekte früher im PMO anmelden\n- Betriebskonzept (Wer pflegt Inhalte?) als eigenes Deliverable definieren\n- Nutzerfeedback nach Go-Live systematisch einplanen (Umfrage nach 4 Wochen)\n\nLESSONS LEARNED SITZUNGSPLAN:\n01 Rückblick – Projektziele vs. Ergebnisse, Zeitplan, Budget (15 min)\n02 Stärken sammeln – jeder nennt 2 Punkte (10 min)\n03 Schwächen sammeln – ohne Schuldzuweisungen (15 min)\n04 Ursachenanalyse – Warum ist es passiert? (10 min)\n05 Maßnahmen – konkrete Verbesserungen für nächste Projekte (15 min)\n06 Dokumentation – Ergebnisse ins Abschlussdokument, Übergabe an PMO (5 min)", open:true, generated:false }

var af = "all";

function gc(id) { return CATS.find(function(c){ return c.id===id; }) || CATS[5]; }

function td() {
  var d = new Date();
  return d.getDate() + '.' + (d.getMonth()+1) + '.' + d.getFullYear();
}

function renderFBar() {
  var b = document.getElementById('fbar');
  var h = '<button class="fbtn'+(af==='all'?' on':'')+'" onclick="sf(\'all\')">Alle</button>';
  CATS.forEach(function(c) {
    if (!entries.some(function(e){ return e.cat===c.id; })) return;
    h += '<button class="fbtn'+(af===c.id?' on':'')+'" onclick="sf(\''+c.id+'\')">'+
      '<span class="cdot" style="background:'+c.dt+'"></span>'+c.l+'</button>';
  });
  b.innerHTML = h;
}

function renderList() {
  var el = document.getElementById('list');
  var tot = entries.length;
  document.getElementById('cnt').textContent = tot + (tot===1 ? ' Eintrag' : ' Einträge');

  var vis = af==='all' ? entries : entries.filter(function(e){ return e.cat===af; });

  if (!vis.length) {
    el.innerHTML = '<div class="empty">Keine Einträge in dieser Kategorie.</div>';
    return;
  }

  el.innerHTML = vis.map(function(e) {
    var c = gc(e.cat);
    var resultHtml = e.generated && e.note
      ? '<div class="result-text">'+escHtml(e.note)+'</div>'
      : '<textarea placeholder="Notiz / Kontext..." onchange="saveN('+e.id+',this.value)" onkeyup="saveN('+e.id+',this.value)">'+escHtml(e.note)+'</textarea>';

    return '<div class="card'+(e.done?' done':'')+'" id="ec-'+e.id+'">'
      +'<div class="card-main">'
        +'<div class="chk'+(e.done?' on':'')+'" onclick="tog('+e.id+')" title="Abhaken"></div>'
        +'<span class="pill" style="background:'+c.bg+';color:'+c.tx+'">'+c.l+'</span>'
        +'<span class="ename">'+escHtml(e.name)+'</span>'
        +'<span class="edate">'+e.date+'</span>'
        +'<button class="icon-btn ai" onclick="genEx('+e.id+')" id="gbtn-'+e.id+'">'
          +(e.generated ? 'Neu generieren' : 'Übungen generieren')
        +'</button>'
        +'<button class="icon-btn" onclick="togN('+e.id+')" title="Notiz">'+
          (e.open ? '▲' : (e.note ? '★' : '☆'))+'</button>'
        +'<button class="icon-btn del" onclick="rem('+e.id+')" title="Löschen">×</button>'
      +'</div>'
      +'<div class="sub'+(e.open?' open':'')+'" id="sub-'+e.id+'">'
        +'<div class="sub-inner">'
          +'<div class="loading-row" id="lo-'+e.id+'">'
            +'<div class="spin"></div>'
            +'Übungen werden generiert...'
          +'</div>'
          + resultHtml
        +'</div>'
      +'</div>'
    +'</div>';
  }).join('');
}

function escHtml(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function render() { renderFBar(); renderList(); }
function sf(id) { af=id; render(); }

function tog(id) {
  entries = entries.map(function(e){ return e.id===id ? Object.assign({},e,{done:!e.done}) : e; });
  render();
}

function togN(id) {
  entries = entries.map(function(e){ return e.id===id ? Object.assign({},e,{open:!e.open}) : e; });
  render();
}

function saveN(id, v) {
  entries = entries.map(function(e){ return e.id===id ? Object.assign({},e,{note:v, generated:false}) : e; });
}

function rem(id) {
  entries = entries.filter(function(e){ return e.id!==id; });
  render();
}

function addE() {
  var name = document.getElementById('nn').value.trim();
  if (!name) return;
  var cat = document.getElementById('nc').value;
  var note = document.getElementById('no').value.trim();
  entries.push({ id:Date.now(), name:name, cat:cat, done:false, date:td(), note:note, open:!!note, generated:false });
  document.getElementById('nn').value = '';
  document.getElementById('no').value = '';
  render();
}

function genEx(id) {
  var e = entries.find(function(x){ return x.id===id; });
  if (!e) return;

  var gbtn = document.getElementById('gbtn-'+id);
  var lo   = document.getElementById('lo-'+id);
  var sub  = document.getElementById('sub-'+id);

  if (gbtn) { gbtn.disabled=true; gbtn.textContent='Lädt...'; }
  if (sub)  sub.classList.add('open');
  if (lo)   lo.classList.add('show');

  var c = gc(e.cat);
  var prompt = 'Erstelle bitte Übungen zum Thema "'+e.name+'" (Kategorie: '+c.l
    +') aus meinem Weiterbildungsmodul (Office Manager / Projektmanagement / Scrum Master bei ChapterNext, Laufzeit 30.03.–12.10.2026).'
    +' Liefere gemischten Schwierigkeitsgrad mit genau diesen 4 Teilen:\n'
    +'1. Multiple-Choice-Frage (4 Antwortoptionen A–D, eine richtig, Lösung ganz am Ende)\n'
    +'2. Praxisaufgabe / Szenario (kurzer realistischer Fall aus dem Berufsalltag zum aktiven Lösen)\n'
    +'3. Erklärung + Beispiel (max. 3 Sätze Erklärung + 1 konkretes Praxisbeispiel)\n'
    +'4. Reflexionsfrage (bezieht sich auf eigene Erfahrungen oder Berufssituationen)\n'
    +(e.note && !e.generated ? 'Zusatzkontext: '+e.note+'\n' : '')
    +'Antworte auf Deutsch, klar gegliedert mit nummerierten Überschriften.';

  fetch('https://api.anthropic.com/v1/messages', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({
      model: 'claude-sonnet-4-20250514',
      max_tokens: 1200,
      messages: [{ role:'user', content:prompt }]
    })
  })
  .then(function(r){ return r.json(); })
  .then(function(data){
    if (lo) lo.classList.remove('show');
    if (gbtn) { gbtn.disabled=false; gbtn.textContent='Neu generieren'; }
    var text = (data.content && data.content[0] && data.content[0].text) || 'Keine Antwort erhalten.';
    entries = entries.map(function(x){ return x.id===id ? Object.assign({},x,{note:text, open:true, generated:true}) : x; });
    render();
  })
  .catch(function(err){
    if (lo) lo.classList.remove('show');
    if (gbtn) { gbtn.disabled=false; gbtn.textContent='Übungen generieren'; }
    entries = entries.map(function(x){
      return x.id===id ? Object.assign({},x,{note:'Fehler beim Generieren. Bitte erneut versuchen.\n\n'+err, open:true, generated:false}) : x;
    });
    render();
  });
}

function buildSel() {
  var s = document.getElementById('nc');
  s.innerHTML = CATS.map(function(c){ return '<option value="'+c.id+'">'+c.l+'</option>'; }).join('');
  s.value = 'algo';
}

document.getElementById('nn').addEventListener('keydown', function(e){ if(e.key==='Enter') addE(); });

buildSel();
render();
</script>
</body>
</html>
