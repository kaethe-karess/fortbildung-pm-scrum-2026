<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Übungen – Weiterbildung</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #F7F6F2;
    --surface: #FFFFFF;
    --surface2: #F0EFE9;
    --border: #E2E0D8;
    --border2: #CCCAB8;
    --text: #1A1917;
    --text2: #6B6960;
    --text3: #A8A69C;
    --blue: #185FA5;
    --blue-bg: #EAF2FC;
    --blue-dark: #0C447C;
    --green: #2D7A4F;
    --green-bg: #EBF5EE;
    --purple: #534AB7;
    --purple-bg: #EEEDFE;
    --amber: #854F0B;
    --amber-bg: #FEF3E2;
    --teal: #0F6E56;
    --teal-bg: #E3F5EE;
    --gray: #5F5E5A;
    --gray-bg: #F1F0EC;
    --red: #A32D2D;
    --red-bg: #FEF0F0;
    --radius: 10px;
    --radius-sm: 6px;
    --shadow: 0 1px 3px rgba(0,0,0,0.06), 0 1px 2px rgba(0,0,0,0.04);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    padding: 2rem 1rem;
    font-size: 15px;
    line-height: 1.6;
  }

  .app {
    max-width: 720px;
    margin: 0 auto;
  }

  header {
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    margin-bottom: 2rem;
    padding-bottom: 1.5rem;
    border-bottom: 1px solid var(--border);
  }

  .header-left h1 {
    font-size: 26px;
    font-weight: 500;
    letter-spacing: -0.5px;
    color: var(--text);
  }

  .header-left p {
    font-size: 13px;
    color: var(--text3);
    margin-top: 2px;
  }

  .badge {
    background: var(--blue-bg);
    color: var(--blue-dark);
    font-size: 12px;
    font-weight: 500;
    padding: 4px 10px;
    border-radius: 20px;
    margin-top: 4px;
    display: inline-flex;
    align-items: center;
    gap: 5px;
  }

  .badge::before {
    content: '';
    width: 6px; height: 6px;
    background: var(--blue);
    border-radius: 50%;
    animation: pulse 2s ease-in-out infinite;
  }

  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.4; }
  }

  .filters {
    display: flex;
    gap: 6px;
    flex-wrap: wrap;
    margin-bottom: 1rem;
  }

  .fbtn {
    padding: 5px 14px;
    font-size: 13px;
    font-family: 'DM Sans', sans-serif;
    border-radius: 20px;
    border: 1px solid var(--border2);
    background: var(--surface);
    color: var(--text2);
    cursor: pointer;
    transition: all .15s;
    display: flex;
    align-items: center;
    gap: 6px;
  }

  .fbtn:hover { border-color: var(--blue); color: var(--blue); }
  .fbtn.on { background: var(--blue); color: white; border-color: var(--blue); }

  .cdot {
    width: 7px; height: 7px;
    border-radius: 50%;
    display: inline-block;
    flex-shrink: 0;
  }

  .entries { display: flex; flex-direction: column; gap: 8px; margin-bottom: 1.5rem; }

  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    box-shadow: var(--shadow);
    overflow: hidden;
    transition: box-shadow .2s;
  }

  .card:hover { box-shadow: 0 3px 8px rgba(0,0,0,0.09); }
  .card.done .ename { color: var(--text3); text-decoration: line-through; }

  .card-main {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 12px 14px;
  }

  .chk {
    width: 20px; height: 20px;
    border-radius: 5px;
    border: 1.5px solid var(--border2);
    background: transparent;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
    transition: all .15s;
  }

  .chk:hover { border-color: var(--blue); }
  .chk.on { background: var(--blue); border-color: var(--blue); }

  .chk.on::after {
    content: '';
    display: block;
    width: 5px; height: 9px;
    border: 2px solid white;
    border-left: none; border-top: none;
    transform: rotate(45deg) translate(-1px, -1px);
  }

  .pill {
    font-size: 11px;
    font-weight: 500;
    font-family: 'DM Mono', monospace;
    padding: 2px 9px;
    border-radius: 20px;
    white-space: nowrap;
    flex-shrink: 0;
    letter-spacing: 0.02em;
  }

  .ename {
    font-size: 15px;
    color: var(--text);
    flex: 1;
    font-weight: 400;
  }

  .edate {
    font-size: 12px;
    color: var(--text3);
    flex-shrink: 0;
    font-family: 'DM Mono', monospace;
  }

  .icon-btn {
    background: none;
    border: none;
    cursor: pointer;
    color: var(--text3);
    font-size: 13px;
    padding: 4px 8px;
    border-radius: var(--radius-sm);
    transition: all .15s;
    flex-shrink: 0;
    white-space: nowrap;
    font-family: 'DM Sans', sans-serif;
    display: flex; align-items: center; gap: 5px;
  }

  .icon-btn:hover { background: var(--surface2); color: var(--text); }

  .icon-btn.ai {
    color: var(--blue-dark);
    background: var(--blue-bg);
    font-weight: 500;
    font-size: 12px;
  }

  .icon-btn.ai:hover { background: #D4E8F8; }
  .icon-btn.ai:disabled { opacity: 0.5; cursor: default; background: var(--surface2); color: var(--text3); }
  .icon-btn.del:hover { color: var(--red); background: var(--red-bg); }

  .sub {
    display: none;
    border-top: 1px solid var(--border);
    background: var(--surface2);
  }

  .sub.open { display: block; }

  .sub-inner { padding: 12px 14px 14px 44px; }

  .sub textarea {
    width: 100%;
    font-size: 13px;
    font-family: 'DM Sans', sans-serif;
    padding: 10px 12px;
    border: 1px solid var(--border2);
    border-radius: var(--radius-sm);
    background: var(--surface);
    color: var(--text);
    resize: vertical;
    min-height: 80px;
    outline: none;
    line-height: 1.7;
    transition: border-color .15s;
  }

  .sub textarea:focus { border-color: var(--blue); }

  .loading-row {
    display: none;
    align-items: center;
    gap: 8px;
    font-size: 13px;
    color: var(--text2);
    padding: 8px 0;
  }

  .loading-row.show { display: flex; }

  .spin {
    width: 14px; height: 14px;
    border: 2px solid var(--border2);
    border-top-color: var(--blue);
    border-radius: 50%;
    animation: spin .7s linear infinite;
    flex-shrink: 0;
  }

  @keyframes spin { to { transform: rotate(360deg); } }

  .add-section {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    box-shadow: var(--shadow);
    padding: 1.25rem;
  }

  .add-section h3 {
    font-size: 14px;
    font-weight: 500;
    color: var(--text2);
    margin-bottom: 10px;
    text-transform: uppercase;
    letter-spacing: 0.06em;
    font-size: 11px;
  }

  .add-row { display: flex; gap: 8px; margin-bottom: 8px; }

  .add-row input, .add-row select {
    font-family: 'DM Sans', sans-serif;
    font-size: 14px;
    padding: 9px 12px;
    border: 1px solid var(--border2);
    border-radius: var(--radius-sm);
    background: var(--bg);
    color: var(--text);
    outline: none;
    transition: border-color .15s;
  }

  .add-row input { flex: 1; }
  .add-row input:focus, .add-row select:focus { border-color: var(--blue); background: white; }

  .add-note {
    width: 100%;
    font-family: 'DM Sans', sans-serif;
    font-size: 13px;
    padding: 9px 12px;
    border: 1px solid var(--border2);
    border-radius: var(--radius-sm);
    background: var(--bg);
    color: var(--text);
    outline: none;
    margin-bottom: 10px;
    transition: border-color .15s;
  }

  .add-note:focus { border-color: var(--blue); background: white; }

  .add-btn {
    width: 100%;
    padding: 10px;
    font-size: 14px;
    font-weight: 500;
    font-family: 'DM Sans', sans-serif;
    background: var(--blue);
    color: white;
    border: none;
    border-radius: var(--radius-sm);
    cursor: pointer;
    transition: background .15s;
    letter-spacing: 0.01em;
  }

  .add-btn:hover { background: var(--blue-dark); }

  .empty {
    text-align: center;
    padding: 2rem;
    color: var(--text3);
    font-size: 14px;
  }

  .result-text {
    font-size: 13px;
    color: var(--text);
    line-height: 1.8;
    white-space: pre-wrap;
    word-break: break-word;
    margin-top: 8px;
  }

  footer {
    text-align: center;
    margin-top: 2.5rem;
    font-size: 12px;
    color: var(--text3);
    font-family: 'DM Mono', monospace;
  }

  /* === MODUL-SEKTION === */
  .modul-section {
    margin-bottom: 2.5rem;
  }

  .modul-header {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 10px 14px;
    background: var(--blue-bg);
    border: 1px solid #C5DAEF;
    border-radius: var(--radius);
    margin-bottom: 12px;
    cursor: default;
  }

  .modul-header .modul-icon {
    font-size: 16px;
  }

  .modul-header h2 {
    font-size: 14px;
    font-weight: 500;
    color: var(--blue-dark);
    flex: 1;
  }

  .modul-header .modul-meta {
    font-size: 12px;
    color: var(--blue);
    font-family: 'DM Mono', monospace;
  }

  /* === KAPITEL-ORDNER === */
  .kapitel-list {
    display: flex;
    flex-direction: column;
    gap: 10px;
  }

  .kapitel {
    border: 1px solid var(--border);
    border-radius: var(--radius);
    background: var(--surface);
    box-shadow: var(--shadow);
    overflow: hidden;
  }

  .kapitel-header {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 12px 14px;
    cursor: pointer;
    user-select: none;
    transition: background 0.15s;
  }

  .kapitel-header:hover {
    background: var(--surface2);
  }

  .kapitel-num {
    width: 26px;
    height: 26px;
    border-radius: 50%;
    background: var(--blue);
    color: #fff;
    font-size: 12px;
    font-weight: 500;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    font-family: 'DM Mono', monospace;
  }

  .kapitel-title {
    flex: 1;
    font-size: 14px;
    font-weight: 500;
    color: var(--text);
  }

  .kapitel-subtitle {
    font-size: 12px;
    color: var(--text3);
    font-weight: 400;
  }

  .kapitel-stats {
    font-size: 12px;
    color: var(--text3);
    font-family: 'DM Mono', monospace;
  }

  .kapitel-toggle {
    font-size: 11px;
    color: var(--text3);
    transition: transform 0.2s;
  }

  .kapitel-toggle.open {
    transform: rotate(180deg);
  }

  .kapitel-body {
    display: none;
    padding: 0 14px 14px;
    border-top: 1px solid var(--border);
  }

  .kapitel-body.open {
    display: block;
  }

  .kapitel-entries {
    margin-top: 12px;
    display: flex;
    flex-direction: column;
    gap: 8px;
  }

  .kapitel-empty {
    padding: 16px;
    text-align: center;
    color: var(--text3);
    font-size: 13px;
    background: var(--bg);
    border-radius: var(--radius-sm);
    border: 1px dashed var(--border2);
  }

  .kapitel-add {
    margin-top: 12px;
    display: flex;
    gap: 8px;
    align-items: center;
  }

  .kapitel-add input {
    flex: 1;
    padding: 8px 10px;
    font-size: 13px;
    font-family: 'DM Sans', sans-serif;
    border: 1px solid var(--border2);
    border-radius: var(--radius-sm);
    background: var(--bg);
    color: var(--text);
    outline: none;
  }

  .kapitel-add input:focus {
    border-color: var(--blue);
    background: #fff;
  }

  .kapitel-add button {
    padding: 8px 14px;
    font-size: 13px;
    font-family: 'DM Sans', sans-serif;
    background: var(--blue);
    color: #fff;
    border: none;
    border-radius: var(--radius-sm);
    cursor: pointer;
    white-space: nowrap;
  }

  .kapitel-add button:hover {
    background: var(--blue-dark);
  }

  /* Kapitel-Card (kompakter als normale Card) */
  .kcard {
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    overflow: hidden;
  }

  .kcard-main {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 9px 12px;
  }

  .kcard .chk {
    width: 16px;
    height: 16px;
    border-radius: 4px;
    flex-shrink: 0;
  }

  .kcard .ename {
    flex: 1;
    font-size: 13px;
    color: var(--text);
  }

  .kcard.done .ename {
    text-decoration: line-through;
    color: var(--text3);
  }

  .kcard .edate {
    font-size: 11px;
    color: var(--text3);
    font-family: 'DM Mono', monospace;
  }

  .kcard-sub {
    display: none;
    padding: 8px 12px 10px;
    border-top: 1px solid var(--border);
    background: var(--surface);
  }

  .kcard-sub.open {
    display: block;
  }

  .kcard-sub textarea {
    width: 100%;
    min-height: 80px;
    font-size: 13px;
    font-family: 'DM Sans', sans-serif;
    color: var(--text);
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    padding: 8px;
    resize: vertical;
    outline: none;
    line-height: 1.6;
  }

  .kcard-sub .result-text {
    font-size: 13px;
    color: var(--text);
    line-height: 1.8;
    white-space: pre-wrap;
    word-break: break-word;
  }

  .legacy-section-header {
    font-size: 12px;
    font-weight: 500;
    color: var(--text3);
    text-transform: uppercase;
    letter-spacing: 0.8px;
    margin: 2rem 0 0.75rem;
    padding-bottom: 6px;
    border-bottom: 1px solid var(--border);
  }
</style>
</head>

var KAPITEL = [

        id: 1001,
        name: "Projektbeschreibung vs. Definition des Projekts",
        done: false,
        date: "31.03.2026",
        note: "PROJEKTBESCHREIBUNG = das WAS\nEine inhaltliche, oft informelle Zusammenfassung, die erklärt, worum es beim Vorhaben geht. Beschreibt Ziel, Kontext und grobe Idee. Kann bereits vor dem offiziellen Projektstart existieren – z.B. als Pitch oder Ideen-Skizze.\n\nDEFINITION DES PROJEKTS = das WIE VERBINDLICH\nLegt fest, dass ein Vorhaben die formalen Kriterien eines Projekts erfüllt (einmalig, zeitlich befristet, klares Ziel, begrenzte Ressourcen, Komplexität). Erst durch die Definition wird aus einer Idee offiziell ein Projekt – mit Projektauftrag, Budget und Verantwortlichkeiten.\n\nKURZFORMEL:\nDie Projektbeschreibung sagt WAS gemacht werden soll.\nDie Projektdefinition sagt DASS es ein Projekt ist und unter welchen Bedingungen es durchgeführt wird.\n\nMERKHILFE: Beschreibung = Idee. Definition = Verbindlichkeit.",
        open: true,

      {
        id: 1012,
        name: "Zielhierarchie – Hauptziel, Teilziele & Zielvorgaben",
        done: false,
        date: "31.03.2026",
        note: "DREI EBENEN DER ZIELSETZUNG IM PROJEKT:\n\n── EBENE 1: BESTIMMUNG DES HAUPTZIELS ──\nEin übergeordnetes Ziel, das das angestrebte Ergebnis des Projekts beschreibt.\n→ Das WARUM und WAS des Projekts auf höchster Ebene.\nBeispiel Softwareprojekt: Entwicklung einer benutzerfreundlichen und funktionsreichen Lösung.\nBeispiel Wissensdatenbank: Eine zentrale, durchsuchbare Wissensdatenbank, die alle 500 MA in Echtzeit mit geprüften Antworten versorgt.\n\n── EBENE 2: FESTLEGUNG VON TEILZIELEN ──\nNeben dem Hauptziel werden Meilensteine definiert, die zur Erreichung des Hauptziels erforderlich sind.\nTeilziele gliedern das Projekt in kleinere Schritte und machen den Fortschritt messbar.\nBeispiel Bauprojekt: Fertigstellung der Rohbauarbeiten.\nBeispiel Wissensdatenbank:\n• Teilziel 1: Anforderungsanalyse abgeschlossen\n• Teilziel 2: Software ausgewählt und konfiguriert\n• Teilziel 3: Pilotbetrieb erfolgreich\n• Teilziel 4: Alle 500 MA geschult\n\n── EBENE 3: SPEZIFISCHE ZIELVORGABEN ──\nZiele werden präzise und messbar formuliert – mit Angaben zu Zeitvorgaben, Budget, Qualität oder anderen quantifizierbaren Kriterien.\n→ Das ist die SMART-Ebene der Zieldefinition.\nBeispiel: Fertigstellung des Projekts innerhalb von 6 Monaten.\nBeispiel Wissensdatenbank:\n• Einarbeitungszeit neuer MA um 40% reduzieren\n• Fehlerquote im Kundenkontakt um 25% senken\n• Nutzungsrate >80% innerhalb von 4 Wochen nach Rollout\n\n━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━\nDIE SCHLÜSSELFRAGE ZUR ZIELDEFINITION:\n'Kannst Du das geplante Ziel überhaupt erreichen, oder ist es bereits zu Beginn zum Scheitern verurteilt?'\n→ Diese Frage führt direkt zu SMART-Zielen und der Risikoanalyse.\n\nVERBINDUNG ZU ANDEREN EINTRÄGEN:\n• Hauptziel → steht im Projektauftrag (Eintrag 1)\n• Teilziele → werden zu Milestones (Eintrag 8)\n• Zielvorgaben → werden zu KPIs gemessen (Eintrag 9)\n• Alle drei Ebenen müssen im Magischen Dreieck realistisch sein (Eintrag 7)",
        open: true,

      {
        id: 1010,

        date: "31.03.2026",
        note: "DEFINITION:\nRessourcenrückführung bezeichnet den geordneten Prozess, mit dem am Ende eines Projekts alle eingesetzten Ressourcen wieder in ihre ursprüngliche Verwendung oder in neue Aufgaben überführt werden.\n\nWAS WIRD ZURÜCKGEFÜHRT?\n• Personal: Projektmitglieder kehren in ihre Linienfunktion zurück oder werden neuen Projekten zugewiesen\n• Budget: Nicht verbrauchte Mittel werden freigegeben und dem Auftraggeber / Controlling zurückgemeldet\n• Sachmittel: Geräte, Lizenzen, Räumlichkeiten werden zurückgegeben oder neu zugewiesen\n• Externe Partner: Verträge mit Lieferanten und Dienstleistern werden beendet\n\nWANNIM PROJEKTZYKLUS:\nPhase 4 – Projektabschluss:\n1. Projektergebnis abnehmen\n2. Dokumentation abschließen\n3. Lessons Learned festhalten\n4. RESSOURCENRÜCKFÜHRUNG durchführen\n5. Projektorganisation formal auflösen\n\nWARUM WICHTIG?\n• Verbindung zu den 7 Projektbedingungen: Temporäre Strukturen werden aufgelöst → das ist der Beweis, dass das Projekt wirklich beendet ist\n• Ohne saubere Rückführung: Ressourcen bleiben im Projekt 'hängen', andere Projekte leiden darunter\n• Besonders im Multiprojektmanagement kritisch: eine Person blockiert in zwei Projekten gleichzeitig Kapazität\n\nBEISPIEL WISSENSDATENBANK:\n• IT-Mitarbeitende: kehren in regulären IT-Betrieb zurück, übernehmen nun Pflege der Datenbank als Linienaufgabe\n• Projektleiterin: wird für nächstes Projekt oder Linienrolle freigegeben\n• Softwarelizenzen: Projektlizenz wird in Dauerlizenz umgewandelt (kein Rückgabe-Fall hier)\n• Restbudget (ca. 4.000 €): wird ans Controlling zurückgemeldet\n• Externe Beratung: Vertrag mit UX-Agentur nach Abnahme beendet",

        note: "Jedes Projekt bewegt sich innerhalb von 6 Beschränkungen. Eine sorgfältige Planung und das Management dieser Beschränkungen sind entscheidend, um das Projektziel zu erreichen.\n\nDAS KLASSISCHE MAGISCHE DREIECK (Basis):\nZeit ↔ Kosten ↔ Qualität/Umfang\n→ Ändert sich eine Größe, wirkt sich das auf die anderen aus.\nBeispiel: Mehr Umfang = mehr Zeit + mehr Kosten.\n\nDIE ERWEITERTE VERSION – 6 FAKTOREN:\n\n01 | ZEIT\nVariablen: Zeitplan, verfügbare Arbeitsstunden, interne Terminkalender, Anzahl der Projektphasen.\nBeispiel Wissensdatenbank: Rollout muss bis Oktober abgeschlossen sein – Urlaubszeiten im August reduzieren verfügbare Kapazität.\n\n02 | UMFANG\nBeschreibt die Größe des Projekts in Bezug auf Qualität, Genauigkeit und erzielte Ergebnisse.\nVom Umfang hängen Zeit und Kosten direkt ab – größere Projekte erfordern mehr von beidem.\nBeispiel: Wird die Wissensdatenbank auf 3 Sprachen ausgebaut, steigen Aufwand und Budget sofort.\n\n03 | KOSTEN\nBeinhalten das gesamte Projektbudget: Projektkosten, Gehälter, Materialkosten, Mietkosten für Räumlichkeiten.\nBeispiel: 80.000 € Budget – überschreiten durch Softwarewechsel würde Projektauftrag gefährden.\n\n04 | QUALITÄT\nIst das Endergebnis UND gleichzeitig eine eigene Beschränkung.\nFaktoren wie mangelnde Kommunikation oder häufige Änderungen können die Qualität direkt beeinträchtigen.\nBeispiel: Werden Inhalte der Wissensdatenbank nicht geprüft, sinkt die Qualität → Nutzerakzeptanz leidet.\n\n05 | RISIKO\nUnerwartete Ereignisse: erschöpfte Ressourcen, schlechte Leistung, unklare Anforderungen, hohe Kosten, Zeitdruck.\nDurch Risikoanalysen und Risikomanagement-Strategien können Risiken identifiziert und bewältigt werden.\nBeispiel: Softwareanbieter liefert zu spät → Risikoregister hatte diesen Fall als 'mittel' eingestuft → Ausweichplan aktivieren.\n\n06 | RESSOURCEN\nMitarbeiter, Ausrüstung, Material, Räumlichkeiten – eng mit Kostenbeschränkungen verbunden.\nOhne angemessene Zuweisung und Verwaltung:         note: "Das klassische PM unterteilt jedes Projekt in 4 aufeinander aufbauende Phasen – wie Zahnräder, die ineinandergreifen. Der Übergang von einer Phase zur nächsten wird meist durch einen MEILENSTEIN (= definierter, messbarer Zwischenerfolg als Kontrollpunkt) markiert.\n\n━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━\n⚙️ PHASE 1 | PROJEKTINITIIERUNG\nWas passiert: Das Projekt wird formal ins Leben gerufen. Idee wird geprüft, Machbarkeit bewertet, Projektauftrag erstellt, Projektleitung benannt.\nDokumente: Projektbeschreibung, Projektantrag, Projektauftrag, erste Stakeholderanalyse\nErgebnis/Meilenstein: Genehmigter Projektauftrag → Projekt ist offiziell autorisiert\n\nBEISPIEL WISSENSDATENBANK:\nGeschäftsführung genehmigt das Vorhaben. Projektleiterin (TL Customer Service) wird benannt. Budget von 80.000 € freigegeben. Kick-off-Termin festgelegt.\n\n━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━\n⚙️ PHASE 2 | PROJEKTPLANUNG\nWas passiert: Das WIE wird detailliert ausgearbeitet. Zeitplan, Ressourcenplanung, Budgetplanung, Risikoanalyse, Kommunikationsplan.\nDokumente: Projektstrukturplan (PSP), Gantt-Diagramm, Risikoregister, Ressourcenplan\nErgebnis/Meilenstein: Freigegebener Projektplan → Alle wissen, wer was bis wann macht\n\nBEISPIEL WISSENSDATENBANK:\nIT plant technische Infrastruktur. HR plant Schulungskonzept für 500 MA. Softwareanbieter werden verglichen. Zeitplan mit 5 Phasen wird erstellt und vom Auftraggeber abgenommen.\n\nPRIORISIERUNG IN DER PLANUNGSPHASE:\nNicht alles kann gleichzeitig umgesetzt werden → Priorisierung ist Pflicht.\nGängige Methoden:\n• MoSCoW-Methode: Must have / Should have / Could have / Won't have\n• Eisenhower-Matrix: Wichtigkeit vs. Dringlichkeit\n• Nutzwertanalyse: Kriterien gewichten und Optionen bewerten\n• Dot Voting im Team: demokratische Schnellpriorisierung\n\n━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━\n⚙️ PHASE 3 | PROJEKTSTEUERUNG\n(nicht nur 'Durchführung' – betont aktives Eingreifen!)\nWas passiert: Der Plan wird umgesetzt UND laufend überwacht. Abweichungen werden erkannt und korrigiert. Änderungen werden gesteuert (Change Management).\nDokumente: Statusberichte, Fortschrittsberichte, Änderungsanträge, Risikoprotokoll\nErgebnis/Meilenstein: Alle Arbeitspakete abgeschlossen, Projektergebnis abgenommen\n\nBEISPIEL WISSENSDATENBANK:\nPilotbetrieb mit Team 1 zeigt: Suchfunktion wird kaum genutzt → Steuerungsmaßnahme: UX-Workshop eingeschoben, Benutzeroberfläche angepasst. Zeitplan verschiebt sich um 2 Wochen → Auftraggeber wird informiert, Pufferzeit aktiviert.\n\n━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━\n⚙️ PHASE 4 | PROJEKTABSCHLUSS\nWas passiert: Das Projekt wird formal beendet. Ergebnisse übergeben, Abschlussbericht erstellt, Lessons Learned dokumentiert, Projektteam aufgelöst.\nDokumente: Projektabschlussbericht, Übergabeprotokoll, Lessons-Learned-Dokumentation, Nachkalkulation\nErgebnis/Meilenstein: Abnahme durch Auftraggeber + formale Auflösung der Projektorganisation\n\nBEISPIEL WISSENSDATENBANK:\nAlle 500 MA arbeiten mit der Datenbank. Übergabe an IT-Betrieb (wird zur Routineaufgabe). Abschlussbericht: Einarbeitungszeit um 38 % gesenkt (Ziel: 40 % – nah dran). Lessons Learned: Pilotphase hätte länger sein sollen.\n\n━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━\nWICHTIGER GRUNDSATZ ZUR PRIORISIERUNG:\nIn JEDER Phase muss priorisiert werden – aber der Fokus verschiebt sich:\nInitiierung → Was ist überhaupt machbar?\nPlanung    → Was kommt zuerst? (MoSCoW, Eisenhower)\nSteuerung  → Was ist jetzt gerade kritisch? (Kritischer Pfad)\nAbschluss  → Was war wirklich wichtig? (Lessons Learned)",

        note: "DEFINITION (aus dem Kurs):\nVorgehensmodelle sind strukturierte Ansätze, die helfen, Projekte zu organisieren und durchzuführen. Sie teilen das Projekt in Phasen oder Schritte auf und geben an, was in jeder Phase gemacht werden muss.\n\nVorgehensmodelle helfen dabei:\n• Den Projektablauf zu planen\n• Risiken zu erkennen\n• Den Fortschritt zu überwachen\n\nDIE 3 HAUPTTYPEN (Überblick):\n1. KLASSISCH / PLANGETRIEBEN (z.B. Wasserfall)\n   → Phasen werden sequenziell durchlaufen, alles wird vorab geplant\n   → Gut wenn: Anforderungen klar & stabil sind\n\n2. AGIL (z.B. Scrum, Kanban)\n   → Iterativ, flexibel, in kurzen Zyklen (Sprints)\n   → Gut wenn: Anforderungen sich ändern oder unklar sind\n\n3. HYBRID\n   → Kombination aus klassisch & agil, je nach Projektphase\n   → Gut wenn: Teile des Projekts planbar, andere flexibel sind\n\nWARUM VORGEHENSMODELLE WICHTIG SIND:\nOhne strukturiertes Vorgehensmodell fehlt die gemeinsame Sprache im Team – jeder arbeitet nach eigenem Verständnis, was zu Chaos, Doppelarbeit und Fehlern führt.\n\nVERBINDUNG ZU KAPITEL 1:\nDie 4 Projektphasen (Initiierung → Planung → Steuerung → Abschluss) sind selbst ein klassisches Vorgehensmodell – der Projektlebenszyklus.",

e Fahrradtypen vergleichen (Mountainbike, Rennrad, Citybike)\n• Budget inkl. Zubehör, Wartung, Upgrades bedenken\n• Kriterienliste erstellen: Rahmengröße, Bremsen, Schaltung, Reifenqualität\n• Must-haves von Nice-to-haves trennen → priorisieren\n→ Ergebnis: fundierte Entscheidung die den eigenen Bedürfnissen entspricht\n\nPM-Beispiel: Nutzwertanalyse der 3 Softwareanbieter, Risikoabwägung, Kostenvergleich inkl. Lizenzkosten und Schulungsaufwand.\n\n━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━\nZUSAMMENSPIEL DER 4 PERSPEKTIVEN:\nVisionär    → Wohin wollen wir?\nFakten      → Was haben wir?\nBeziehung   → Mit wem und wie?\nAnalytisch  → Was ist die beste Option?\n→ Alle 4 zusammen → ENTSCHEIDUNGSFINDUNG in der Mitte\n\nFÜR DIE PRAXIS:\nGute Projektleiterinnen wechseln bewusst zwischen diesen 4 Brillen –\nwer nur analytisch denkt, vergisst die Menschen.\nWer nur visionär denkt, verliert den Boden unter den Füßen.",

        note: "Die Stacey-Analyse unterscheidet 4 Projektarten – je nachdem wo ein Projekt auf der Matrix liegt (Anforderungsklarheit × Lösungsklarheit):\n\n━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━\n1 | EINFACH\nAnforderungen: klar & eindeutig\nLösungsansatz: klar, bekannt, bewährt\nUmgebung: vorhersehbar\n→ Vorgehensmodell: TRADITIONELL / Wasserfall\n\nMerkmale:\n• Best Practices existieren und funktionieren zuverlässig\n• Kaum Überraschungen\n• Wenig Koordinationsaufwand nötig\n\nFallbeispiel:\nEinrichten eines neuen Druckers im Büro.\nAnforderung klar (drucken), Lösung bekannt (Treiber installieren, anschließen).\n→ Checkliste abarbeiten, fertig.\n\n━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━\n2 | KOMPLIZIERT\nAnforderungen: weitgehend klar\nLösungsansatz: nicht sofort offensichtlich, aber durch Expertise lösbar\nUmgebung: vorhersehbar, aber Fachwissen nötig\n→ Vorgehensmodell: TRADITIONELL mit Experteneinbindung\n\nMerkmale:\n• Es gibt eine richtige Lösung – man muss sie nur finden\n• Expertenwissen entscheidend\n• Analyse und Planung vor Umsetzung wichtig\n\nFallbeispiel:\nBau einer neuen Brücke.\nZiel klar (Fluss überqueren), aber Statik, Materialwahl und Genehmigungen erfordern Experten.\n→ Klassisches PM mit Ingenieuren und detailliertem Plan.\n\n━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━\n3 | KOMPLEX\nAnforderungen: unklar oder veränderlich\nLösungsansatz: unklar, neu, unerprobt\nUmgebung: unvorhersehbar, viele Interdependenzen\n→ Vorgehensmodell: AGIL / HYBRID\n\nMerkmale:\n• Keine eindeutige richtige Lösung vorab\n• Viele gegenseitige Abhängigkeiten (Interdependenzen)\n• Lernen durch Ausprobieren – Prototypen, Iterationen\n• Erfordert selbstorganisiertes, erfahrenes Team\n\nFallbeispiel:\nEntwicklung einer neuen mobilen App in einem sich schnell ändernden Markt.\nNutzeranforderungen ändern sich laufend, Technologien entwickeln sich weiter.\n→ Scrum: in Sprints entwickeln, nach jedem Sprint Feedback einholen & anpassen.\n\nBeispiel Wissensdatenbank:\nKomplex, weil: Nutzerverhalten unbekannt         note: "AUS DEM KURS:\nSowohl Scrum als auch Kanban sind adaptive Vorgehensmodelle, die zur agilen Methodik zählen und sich durch ihre Flexibilität und Anpassungsfähigkeit auszeichnen.\n\nWICHTIGE KLARSTELLUNG:\nNicht alle agilen Methoden sind automatisch adaptiv.\nEs gibt auch andere Vorgehensmodelle, die als adaptiv bezeichnet werden können, jedoch nicht unbedingt agil sind.\n\n━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━\nDER KERNUNTERSCHIED:\n\nAGIL = eine spezifische Philosophie & Prinzipien im PM\n• Basiert auf dem Agilen Manifest (2001)\n• Konkrete Werte: Individuen > Prozesse, funktionierende Software > Dokumentation, Zusammenarbeit > Verträge, Reagieren auf Veränderung > Plan folgen\n• Hat spezifische Frameworks: Scrum, Kanban, SAFe, XP\n• Immer auch adaptiv – aber umgekehrt gilt das NICHT\n\nADAPTIV = übergeordneter Begriff für Anpassungsfähigkeit\n• Beschreibt die FÄHIGKEIT, sich an Veränderungen anzupassen\n• Keine eigene Philosophie oder Wertesystem\n• Kann auch in klassischen oder hybriden Projekten vorkommen\n• Kein Synonym für agil – sondern eine Eigenschaft\n\n━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━\nMERKFORMEL:\nAgil ⊂ Adaptiv  (Agil ist IMMER adaptiv)\nAdaptiv ⊄ Agil  (Adaptiv ist NICHT immer agil)\n\nWie ein Quadrat (agil) immer ein Rechteck (adaptiv) ist –\naber ein Rechteck nicht immer ein Quadrat.\n\n━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━\nBEISPIELE:\n\nAGIL (Philosophie + Framework):\n→ Ein Software-Team arbeitet in 2-Wochen-Sprints mit Scrum.\n   Nach jedem Sprint entscheidet der Product Owner neu, was als nächstes gebaut wird.\n   Das Team folgt den Werten des Agilen Manifests.\n   → AGIL (und damit auch adaptiv)\n\nADAPTIV aber NICHT agil:\n→ Ein klassisches Bauprojekt mit Wasserfall-Planung.\n   Nach einem Erdbeben müssen Pläne kurzfristig angepasst werden.\n   Das Projektteam reagiert flexibel auf die neue Situation.\n   → ADAPTIV (Anpassungsfähigkeit) – aber NICHT agil (kein agiles Framework, keine agile Philosophie)\n\n→ Ein Eventmanagement-Team plant eine Messe klassisch vor.\n   Kurzfristig fällt ein Aussteller aus → Programm wird umstrukturiert.\n   → ADAPTIV – aber kein Scrum, kein Kanban, kein agiles Manifest\n\nADAPTIV UND AGIL:\n→ Kanban-Board im IT-Support: neue Tickets kommen täglich rein,\n   Prioritäten werden laufend angepasst, WIP-Limit wird eingehalten.\n   → Beides: agile Methode (Kanban) + adaptives Vorgehen\n\n━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━\nFÜR DIE PRÜFUNG:\nFrage: 'Ist das Spiralmodell agil?'\nAntwort: NEIN – es ist adaptiv (iterativ, Risikozyklen), aber folgt nicht dem Agilen Manifest und ist kein agiles Framework.",

        note: "DEFINITION (aus dem Kurs):\nScrum ist ein Projektmanagement-Framework, das für seine einfache und schlanke Arbeitsweise bekannt ist. Es basiert auf der Idee, dass Projekte in kleinen, abgeschlossenen Abschnitten bearbeitet werden, die als Sprints bezeichnet werden. Jeder Sprint konzentriert sich darauf, eine bestimmte Menge Arbeit zu erledigen und eine neue Version des Produkts zu liefern.\n\nDAS BESONDERE AN SCRUM:\nRegelmäßige Feedbackschleifen. Nach jedem Sprint wird das Produkt bewertet und das Feedback der Kunden und Stakeholder fließt in die weitere Entwicklung ein → ständige Verbesserung und Anpassung.\n\nDIE 3 HAUPTROLLEN:\n\n1. PRODUCT OWNER (PO)\n   → Versteht die Anforderungen des Kunden\n   → Bringt sie in die Produktentwicklung ein\n   → Pflegt und priorisiert das Product Backlog\n\n2. SCRUM MASTER (SM)\n   → Sorgt für einen reibungslosen Ablauf des Prozesses\n   → Unterstützt das Team bei der Einhaltung der Scrum-Prinzipien\n   → Kein klassischer Projektmanager – eher Coach & Moderator\n   → Servant Leadership: dient dem Team, gibt keine Anweisungen\n\n3. ENTWICKLUNGSTEAM\n   → Arbeitet gemeinsam an der Umsetzung der Anforderungen\n   → Liefert kontinuierlich Ergebnisse\n   → Selbstorganisiert – keine traditionelle Projektmanager-Rolle im Team\n\nKEIN TRADITIONELLER PROJEKTMANAGER:\nIn Scrum gibt es keine klassische Projektmanager-Rolle. Die Verantwortung ist auf die 3 Rollen verteilt.\n\nDER SCRUM-ABLAUF (aus der Grafik):\nProduct Backlog\n    ↓ (Sprint Planning)\nSprint Backlog\n    ↓ (Team Sprint – iterativer Zyklus)\nProduct Increment\n    ↑ (Daily Scrum Meeting alle 24h – Synchronisation im Team)\n\nDIE 5 SCRUM-ARTEFAKTE & EVENTS:\nArtefakte:  Product Backlog · Sprint Backlog · Product Increment\nEvents:     Sprint Planning · Daily Scrum · Sprint Review · Sprint Retrospective\n\nVERBINDUNG ZU KAPITEL 2:\nScrum ist die bekannteste Ausprägung des AGILEN Vorgehensmodells.\nWo Wasserfall linear ist, arbeitet Scrum in Schleifen (Sprints) var kEntryCounter = 1000;

function kTd() {
  var d = new Date();
  return d.getDate() + '.' + (d.getMonth()+1) + '.' + d.getFullYear();
}

function toggleKapitel(kid) {
  var k = KAPITEL.find(function(x){ return x.id === kid; });
  if (k) { k.open = !k.open; renderKapitel(); }
}

function addKEntry(kid) {
  var inp = document.getElementById('kinp-' + kid);
  if (!inp || !inp.value.trim()) return;
  var k = KAPITEL.find(function(x){ return x.id === kid; });
  if (!k) return;
  k.entries.push({
    id: ++kEntryCounter,
    name: inp.value.trim(),
    done: false,
    date: kTd(),
    note: '',
    open: false,
    generated: false
  });
  inp.value = '';
  renderKapitel();
}

function togKEntry(kid, eid) {
  var k = KAPITEL.find(function(x){ return x.id === kid; });
  if (!k) return;
  k.entries = k.entries.map(function(e){ return e.id===eid ? Object.assign({},e,{done:!e.done}) : e; });
  renderKapitel();
}

function togKNote(kid, eid) {
  var k = KAPITEL.find(function(x){ return x.id === kid; });
  if (!k) return;
  k.entries = k.entries.map(function(e){ return e.id===eid ? Object.assign({},e,{open:!e.open}) : e; });
  renderKapitel();
}

function saveKNote(kid, eid, val) {
  var k = KAPITEL.find(function(x){ return x.id === kid; });
  if (!k) return;
  k.entries = k.entries.map(function(e){ return e.id===eid ? Object.assign({},e,{note:val, generated:false}) : e; });
}

function remKEntry(kid, eid) {
  var k = KAPITEL.find(function(x){ return x.id === kid; });
  if (!k) return;
  k.entries = k.entries.filter(function(e){ return e.id !== eid; });
  renderKapitel();
}

function genKEx(kid, eid) {
  var k = KAPITEL.find(function(x){ return x.id === kid; });
  if (!k) return;
  var e = k.entries.find(function(x){ return x.id === eid; });
  if (!e) return;

  var gbtn = document.getElementById('kgbtn-'+eid);
  var lo   = document.getElementById('klo-'+eid);
  var sub  = document.getElementById('ksub-'+eid);

  if (gbtn) { gbtn.disabled=true; gbtn.textContent='Lädt...'; }
  if (sub)  { sub.classList.add('open'); k.entries = k.entries.map(function(x){ return x.id===eid ? Object.assign({},x,{open:true}) : x; }); }
  if (lo)   lo.classList.add('show');

  var prompt = 'Erstelle bitte Übungen zum Thema "'+e.name+'" aus dem Kapitel "'+k.title+'" (Modul 1: Einführung in das klassische Projektmanagement, Weiterbildung Office Manager / Projektmanagement / Scrum Master bei ChapterNext, 2026).'
    +' Liefere gemischten Schwierigkeitsgrad mit genau diesen 4 Teilen:\n'
    +'1. Multiple-Choice-Frage (4 Antwortoptionen A–D, eine richtig, Lösung ganz am Ende)\n'
    +'2. Praxisaufgabe / Szenario (kurzer realistischer Fall aus dem Berufsalltag)\n'
    +'3. Erklärung + Beispiel (max. 3 Sätze + 1 Praxisbeispiel)\n'
    +'4. Reflexionsfrage (bezieht sich auf eigene Erfahrungen)\n'
    +(e.note && !e.generated ? 'Zusatzkontext: '+e.note+'\n' : '')
    +'Antworte auf Deutsch, klar gegliedert mit nummerierten Überschriften. Hebe PM-Fachbegriffe mit ** fett ** hervor.';

  fetch('https://api.anthropic.com/v1/messages', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({
      model: 'claude-sonnet-4-20250514',
      max_tokens: 1200,
      messages: [{ role:'user', content: prompt }]
    })
  })
  .then(function(r){ return r.json(); })
  .then(function(data){
    if (lo) lo.classList.remove('show');
    if (gbtn) { gbtn.disabled=false; gbtn.textContent='Neu generieren'; }
    var text = (data.content && data.content[0] && data.content[0].text) || 'Keine Antwort erhalten.';
    k.entries = k.entries.map(function(x){ return x.id===eid ? Object.assign({},x,{note:text, open:true, generated:true}) : x; });
    renderKapitel();
  })
  .catch(function(err){
    if (lo) lo.classList.remove('show');
    if (gbtn) { gbtn.disabled=false; gbtn.textContent='Übungen generieren'; }
    k.entries = k.entries.map(function(x){
      return x.id===eid ? Object.assign({},x,{note:'Fehler. Bitte erneut versuchen.\n\n'+err, open:true, generated:false}) : x;
    });
    renderKapitel();
  });
}

function toggleAllKapitel() {
  var anyOpen = KAPITEL.some(function(k){ return k.open; });
  KAPITEL.forEach(function(k){ k.open = !anyOpen; });
  renderKapitel();
}

function renderKapitel() {
  var container = document.getElementById('kapitel-list');
  if (!container) return;

  container.innerHTML = KAPITEL.map(function(k) {
    var done = k.entries.filter(function(e){ return e.done; }).length;
    var total = k.entries.length;
    var statsStr = total > 0 ? (done + '/' + total + ' ✓') : 'leer';

    var entriesHtml = '';
    if (k.entries.length === 0) {
      entriesHtml = '<div class="kapitel-empty">Noch keine Einträge – füge deine erste Erkenntnis hinzu ↓</div>';
    } else {
      entriesHtml = '<div class="kapitel-entries">' + k.entries.map(function(e) {
        var noteContent = e.generated && e.note
          ? '<div class="result-text">'+escHtml(e.note)+'</div>'
          : '<textarea placeholder="Notiz / Erkenntnis..." onchange="saveKNote(\''+k.id+'\','+e.id+',this.value)" onkeyup="saveKNote(\''+k.id+'\','+e.id+',this.value)">'+escHtml(e.note)+'</textarea>';

        return '<div class="kcard'+(e.done?' done':'')+'" id="kec-'+e.id+'">'
          +'<div class="kcard-main">'
            +'<div class="chk'+(e.done?' on':'')+'" onclick="togKEntry(\''+k.id+'\','+e.id+')" title="Abhaken"></div>'
            +'<span class="ename">'+escHtml(e.name)+'</span>'
            +'<span class="edate">'+e.date+'</span>'
            +'<button class="icon-btn ai" onclick="genKEx(\''+k.id+'\','+e.id+')" id="kgbtn-'+e.id+'">'+(e.generated?'Neu generieren':'Übungen generieren')+'</button>'
            +'<button class="icon-btn" onclick="togKNote(\''+k.id+'\','+e.id+')" title="Notiz">'+(e.open?'▲':(e.note?'★':'☆'))+'</button>'
            +'<button class="icon-btn del" onclick="remKEntry(\''+k.id+'\','+e.id+')" title="Löschen">×</button>'
          +'</div>'
          +'<div class="kcard-sub'+(e.open?' open':'')+'" id="ksub-'+e.id+'">'
            +'<div class="loading-row" id="klo-'+e.id+'"><div class="spin"></div>Übungen werden generiert...</div>'
            + noteContent
          +'</div>'
        +'</div>';
      }).join('') + '</div>';
    }

    return '<div class="kapitel">'
      +'<div class="kapitel-header" onclick="toggleKapitel(\''+k.id+'\''+')">'
        +'<div class="kapitel-num">'+k.num+'</div>'
        +'<div style="flex:1">'
          +'<div class="kapitel-title">'+k.title+'</div>'
          +'<div class="kapitel-subtitle">'+k.subtitle+'</div>'
        +'</div>'
        +'<span class="kapitel-stats">'+statsStr+'</span>'
        +'<span class="kapitel-toggle'+(k.open?' open':'')+'">▼</span>'
      +'</div>'
      +'<div class="kapitel-body'+(k.open?' open':'')+'">'
        + entriesHtml
        +'<div class="kapitel-add">'
          +'<input type="text" id="kinp-'+k.id+'" placeholder="Neue Erkenntnis / Notiz..." onkeydown="if(event.key===\'Enter\')addKEntry(\''+k.id+'\''+')" />'
          +'<button onclick="addKEntry(\''+k.id+'\''+')">'+'+ Eintrag'+'</button>'
        +'</div>'
      +'</div>'
    +'</div>';
  }).join('');
}

var entries = [
  { id:1, name:"Analogien Algorithmus", cat:"algo", done:false, date:"30.03.2026", note:"", open:false, generated:false },
  { id:2, name:"MYCIN – Algorithmus ja oder nein?", cat:"algo", done:false, date:"30.03.2026", note:"Antwort: Ja – MYCIN ist ein Algorithmus, genauer gesagt ein regelbasierter Entscheidungsalgorithmus.\n\nEin Algorithmus ist eine endliche, eindeutige Folge von Anweisungen, die ein Problem schrittweise löst. MYCIN folgt genau diesem Prinzip: Es wertet Symptome und Labordaten nach fest definierten Wenn-Dann-Regeln aus (z.B. \"Wenn Bakterientyp X vorliegt UND Merkmal Y zutrifft, dann empfehle Antibiotikum Z\"). Die Schritte sind deterministisch, wiederholbar und führen zu einem definierten Ergebnis. Das System terminiert nach der Auswertung aller relevanten Regeln mit einer konkreten Behandlungsempfehlung. Damit erfüllt MYCIN alle klassischen Kriterien eines Algorithmus – auch wenn er durch seine Komplexität eher als \"Expertensystem\" bezeichnet wird.", open:true, generated:false },
  { id:3, name:"Bist wirklich Du das? – Gesichtserkennung & neuronale Netze", cat:"algo", done:false, date:"30.03.2026", note:"Perspektive eines neuronalen Netzes:\n\nWenn ich als neuronales Netz eine Person mit Sonnenbrille oder Maske erkenne, fehlen mir entscheidende Merkmalsbereiche, auf die ich trainiert wurde: Augenpartie, Nasenrücken, Mundform. Meine Neuronen haben gelernt, Gesichter als Gesamtmuster zu gewichten – fällt ein großer Teil davon weg, sinkt meine Konfidenz unter den Schwellenwert und ich verweigere den Zugang.\n\nWarum es trotzdem manchmal klappt: Das Netz erkennt andere stabile Muster – Gesichtskontur, Stirnform, Augenabstand (bei Sonnenbrille noch sichtbar), Hautton, Haaransatz oder die Art, wie jemand den Kopf hält. Wenn diese Restmuster stark genug mit dem gespeicherten Profil übereinstimmen, reicht die Gesamtwahrscheinlichkeit aus.\n\nFehlende Informationen bei Maske: Mund, Nase, Wangen, Kinnpartie – oft 40–60 % der trainierten Merkmale.\n\nTrotzdem erkannte Muster: Augenabstand, Stirn, Schläfenbereich, Ohrform, allgemeine Gesichtsgeometrie – reicht bei gut trainierten Netzen oft noch aus, besonders wenn Trainingsdaten auch maskierte Gesichter enthielten.", open:true, generated:false },
  { id:4, name:"Halluzinationen bei LLMs", cat:"digital", done:false, date:"30.03.2026", note:"Definition: Eine Halluzination bei einem LLM bezeichnet eine Ausgabe, die faktisch falsch, erfunden oder nicht durch die Trainingsdaten belegbar ist – aber vom Modell mit hoher Überzeugung als korrekt präsentiert wird. Das Modell lügt nicht absichtlich, es generiert schlicht die wahrscheinlichste nächste Wortfolge – ohne ein echtes Wahrheitsverständnis.\n\nEntstehungsgründe:\n- LLMs lernen statistische Muster in Sprache, keine verifizierten Fakten\n- Bei seltenen oder widersprüchlichen Trainingsdaten interpoliert das Modell – es füllt Lücken mit plausibel klingenden, aber falschen Inhalten\n- Das Modell hat keinen Mechanismus, um zu erkennen, was es nicht weiß – es antwortet trotzdem\n- Zu hohe Temperatur (Kreativitätsparameter) erhöht die Halluzinationsrate\n\nBeispiele:\n- Erfundene Gerichtsurteile mit korrektem Aktenzeichen-Format aber falschem Inhalt\n- Biografien realer Personen mit erfundenen Lebensstationen\n- Quellenangaben zu Büchern oder Studien, die nicht existieren\n- Falsche Jahreszahlen bei historischen Ereignissen\n\nWie man Halluzinationen erkennt:\n- Fakten aus LLM-Ausgaben immer mit verlässlichen Quellen gegenprüfen\n- Misstrauen bei sehr spezifischen Angaben (Zahlen, Daten, Namen, Zitate)\n- Bei Unsicherheit das Modell direkt fragen: Bist du sicher? Welche Quellen hast du dafür?\n- Ausgaben verschiedener Modelle vergleichen\n\nVorsichtsmaßnahmen:\n- LLMs nie als alleinige Informationsquelle nutzen, besonders bei fachkritischen Themen\n- Eigenes Fachwissen als Korrektiv einsetzen – je mehr man weiß, desto schneller fällt eine Halluzination auf\n- Bei sensiblen Bereichen (Recht, Medizin, Finanzen) immer Experten hinzuziehen\n- Outputs dokumentieren und nachvollziehbar halten", open:true, generated:false },
  { id:5, name:"Trend-Recherche: Projektmanagement & Jobaussichten Düsseldorf 2026", cat:"pm", done:false, date:"30.03.2026", note:"MARKTLAGE\nÜber 160 offene Stellen auf Indeed, ~1.000 auf LinkedIn im Großraum Düsseldorf/NRW (Stand März 2026). Die Nachfrage ist hoch und wächst weiter.\n\nTOP-BRANCHEN IN DÜSSELDORF:\n- Banken & Versicherungen (z.B. Commerzbank, Deutsche Apotheker- und Ärztebank)\n- Telekommunikation & Glasfaser (OXG, Deutsche Glasfaser)\n- Energie & IT-Dienstleistungen\n- Öffentlicher Sektor & Beratung\n\nGEHALT (brutto/Jahr):\n- Projektmanager Einstieg: ~50.000 €\n- Projektmanager erfahren: ~65.000 €\n- IT-Projektmanager erfahren: ~60.000–88.000 €\n- Scrum Master Düsseldorf Einstieg: ~59.600 €\n- Scrum Master Düsseldorf Median: ~82.000 €\n- Scrum Master Düsseldorf Senior: bis ~104.700 €\n- Leiter/in Projektmanagement Ø: ~82.800 €\n\nGEFRAGTE SKILLS:\n- Agile Methoden: Scrum, Kanban, SAFe\n- Zertifikate: PSM I/II, PMP, PRINCE2, IPMA\n- Tools: Jira, MS Project, Excel, PowerPoint, Power BI\n- Soft Skills: Kommunikation, Stakeholdermanagement, Teamführung\n- Trendthemen: KI-Anwendungen, Prozessautomatisierung, hybrides PM\n\nKARRIEREPFAD:\nEinstieg → PMO / Teilprojektkoordination → Projektmanager → Senior PM → Programm-/Projektleitung\n\nFAZIT: Sehr gute Aussichten in Düsseldorf. Mit PSM-Zertifikat und Scrum-Kenntnissen aus der ChapterNext-Weiterbildung liegt man genau im gefragten Profil.", open:true, generated:false },
  { id:6, name:"GPT Canvas vs. Claude Artifacts – KI-Tool-Vergleich", cat:"digital", done:false, date:"30.03.2026", note:"Das Modul KI geht nur auf ChatGPT/OpenAI ein – hier die Ergänzung aus Claude-Perspektive:\n\nClaude's Äquivalent zu GPT Canvas heißt 'Artifacts'.\n\nBEIDE TOOLS: Separater Arbeitsbereich neben dem Chat für Dokumente, Code und Inhalte.\n\nVERGLEICH:\n- Dokumente schreiben & bearbeiten: beide ✓\n- Code schreiben & ausführen: beide ✓\n- Direkte Inline-Bearbeitung im Panel: beide ✓\n- Interaktive HTML/React-Widgets: nur Claude Artifacts ✓\n- SVG-Visualisierungen & Diagramme: Claude deutlich stärker\n- Zielgruppe: Canvas eher Texte & Code / Artifacts breiter inkl. interaktive Apps\n\nGRÖSSTER UNTERSCHIED:\nClaude Artifacts können vollständig interaktive Anwendungen sein (z.B. der Übungsordner als HTML-App). Das geht mit Canvas so nicht.\n\nPRAXISBEISPIEL AUS DIESER WEITERBILDUNG:\nDer KI-gestützte Übungsordner (uebungen-ordner.html) ist ein Claude Artifact – eine vollständige interaktive Web-App, die direkt im Chat gebaut und als Datei exportiert wurde.", open:true, generated:false },

var af = "all";

function gc(id) { return CATS.find(function(c){ return c.id===id; }) || CATS[5]; }

function td() {
  var d = new Date();
  return d.getDate() + '.' + (d.getMonth()+1) + '.' + d.getFullYear();
}

function renderFBar() {
  var b = document.getElementById('fbar');
  var h = '<button class="fbtn'+(af==='all'?' on':'')+'" onclick="sf(\'all\')">Alle</button>';
  CATS.forEach(function(c) {
    if (!entries.some(function(e){ return e.cat===c.id; })) return;
    h += '<button class="fbtn'+(af===c.id?' on':'')+'" onclick="sf(\''+c.id+'\')">'+
      '<span class="cdot" style="background:'+c.dt+'"></span>'+c.l+'</button>';
  });
  b.innerHTML = h;
}

function renderList() {
  var el = document.getElementById('list');
  var tot = entries.length;
  document.getElementById('cnt').textContent = tot + (tot===1 ? ' Eintrag' : ' Einträge');

  var vis = af==='all' ? entries : entries.filter(function(e){ return e.cat===af; });

  if (!vis.length) {
    el.innerHTML = '<div class="empty">Keine Einträge in dieser Kategorie.</div>';
    return;
  }

  el.innerHTML = vis.map(function(e) {
    var c = gc(e.cat);
    var resultHtml = e.generated && e.note
      ? '<div class="result-text">'+escHtml(e.note)+'</div>'
      : '<textarea placeholder="Notiz / Kontext..." onchange="saveN('+e.id+',this.value)" onkeyup="saveN('+e.id+',this.value)">'+escHtml(e.note)+'</textarea>';

    return '<div class="card'+(e.done?' done':'')+'" id="ec-'+e.id+'">'
      +'<div class="card-main">'
        +'<div class="chk'+(e.done?' on':'')+'" onclick="tog('+e.id+')" title="Abhaken"></div>'
        +'<span class="pill" style="background:'+c.bg+';color:'+c.tx+'">'+c.l+'</span>'
        +'<span class="ename">'+escHtml(e.name)+'</span>'
        +'<span class="edate">'+e.date+'</span>'
        +'<button class="icon-btn ai" onclick="genEx('+e.id+')" id="gbtn-'+e.id+'">'
          +(e.generated ? 'Neu generieren' : 'Übungen generieren')
        +'</button>'
        +'<button class="icon-btn" onclick="togN('+e.id+')" title="Notiz">'+
          (e.open ? '▲' : (e.note ? '★' : '☆'))+'</button>'
        +'<button class="icon-btn del" onclick="rem('+e.id+')" title="Löschen">×</button>'
      +'</div>'
      +'<div class="sub'+(e.open?' open':'')+'" id="sub-'+e.id+'">'
        +'<div class="sub-inner">'
          +'<div class="loading-row" id="lo-'+e.id+'">'
            +'<div class="spin"></div>'
            +'Übungen werden generiert...'
          +'</div>'
          + resultHtml
        +'</div>'
      +'</div>'
    +'</div>';
  }).join('');
}

function escHtml(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function render() { renderFBar(); renderList(); }
function sf(id) { af=id; render(); }

function tog(id) {
  entries = entries.map(function(e){ return e.id===id ? Object.assign({},e,{done:!e.done}) : e; });
  render();
}

function togN(id) {
  entries = entries.map(function(e){ return e.id===id ? Object.assign({},e,{open:!e.open}) : e; });
  render();
}

function saveN(id, v) {
  entries = entries.map(function(e){ return e.id===id ? Object.assign({},e,{note:v, generated:false}) : e; });
}

function rem(id) {
  entries = entries.filter(function(e){ return e.id!==id; });
  render();
}

function addE() {
  var name = document.getElementById('nn').value.trim();
  if (!name) return;
  var cat = document.getElementById('nc').value;
  var note = document.getElementById('no').value.trim();
  entries.push({ id:Date.now(), name:name, cat:cat, done:false, date:td(), note:note, open:!!note, generated:false });
  document.getElementById('nn').value = '';
  document.getElementById('no').value = '';
  render();
}

function genEx(id) {
  var e = entries.find(function(x){ return x.id===id; });
  if (!e) return;

  var gbtn = document.getElementById('gbtn-'+id);
  var lo   = document.getElementById('lo-'+id);
  var sub  = document.getElementById('sub-'+id);

  if (gbtn) { gbtn.disabled=true; gbtn.textContent='Lädt...'; }
  if (sub)  sub.classList.add('open');
  if (lo)   lo.classList.add('show');

  var c = gc(e.cat);
  var prompt = 'Erstelle bitte Übungen zum Thema "'+e.name+'" (Kategorie: '+c.l
    +') aus meinem Weiterbildungsmodul (Office Manager / Projektmanagement / Scrum Master bei ChapterNext, Laufzeit 30.03.–12.10.2026).'
    +' Liefere gemischten Schwierigkeitsgrad mit genau diesen 4 Teilen:\n'
    +'1. Multiple-Choice-Frage (4 Antwortoptionen A–D, eine richtig, Lösung ganz am Ende)\n'
    +'2. Praxisaufgabe / Szenario (kurzer realistischer Fall aus dem Berufsalltag zum aktiven Lösen)\n'
    +'3. Erklärung + Beispiel (max. 3 Sätze Erklärung + 1 konkretes Praxisbeispiel)\n'
    +'4. Reflexionsfrage (bezieht sich auf eigene Erfahrungen oder Berufssituationen)\n'
    +(e.note && !e.generated ? 'Zusatzkontext: '+e.note+'\n' : '')
    +'Antworte auf Deutsch, klar gegliedert mit nummerierten Überschriften.';

  fetch('https://api.anthropic.com/v1/messages', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({
      model: 'claude-sonnet-4-20250514',
      max_tokens: 1200,
      messages: [{ role:'user', content:prompt }]
    })
  })
  .then(function(r){ return r.json(); })
  .then(function(data){
    if (lo) lo.classList.remove('show');
    if (gbtn) { gbtn.disabled=false; gbtn.textContent='Neu generieren'; }
    var text = (data.content && data.content[0] && data.content[0].text) || 'Keine Antwort erhalten.';
    entries = entries.map(function(x){ return x.id===id ? Object.assign({},x,{note:text, open:true, generated:true}) : x; });
    render();
  })
  .catch(function(err){
    if (lo) lo.classList.remove('show');
    if (gbtn) { gbtn.disabled=false; gbtn.textContent='Übungen generieren'; }
    entries = entries.map(function(x){
      return x.id===id ? Object.assign({},x,{note:'Fehler beim Generieren. Bitte erneut versuchen.\n\n'+err, open:true, generated:false}) : x;
    });
    render();
  });
}

function buildSel() {
  var s = document.getElementById('nc');
  s.innerHTML = CATS.map(function(c){ return '<option value="'+c.id+'">'+c.l+'</option>'; }).join('');
  s.value = 'algo';
}

document.getElementById('nn').addEventListener('keydown', function(e){ if(e.key==='Enter') addE(); });

buildSel();
render();
renderKapitel();
</script>
