<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fachvokabular · PM + Scrum + KI</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root {
  --bg:#F4F2EC;--surface:#FAFAF7;--surface2:#EDEADE;
  --ink:#1C1917;--ink2:#5C5750;--ink3:#9C9890;--rule:#DDD9CE;
  --blue:#1B4F8A;--blue-lt:#E8F0FB;--blue-dk:#0E3261;
  --green:#1E6B42;--green-lt:#E8F5EE;
  --purple:#4A3FA0;--purple-lt:#EEEDFE;
  --amber:#7A4800;--amber-lt:#FEF3DC;
  --teal:#0F6056;--teal-lt:#E3F5EE;
  --r:10px;--rs:6px;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--ink);min-height:100vh;padding:2.5rem 1rem 5rem;font-size:15px;line-height:1.6;}
.app{max-width:720px;margin:0 auto;}

header{margin-bottom:2rem;padding-bottom:1.5rem;border-bottom:1.5px solid var(--ink);}
.header-top{display:flex;justify-content:space-between;align-items:flex-start;gap:12px;}
h1{font-family:'DM Serif Display',serif;font-size:34px;letter-spacing:-0.5px;line-height:1.1;}
h1 em{font-style:italic;color:var(--blue);}
.header-meta{font-size:12px;color:var(--ink3);margin-top:5px;font-family:'DM Mono',monospace;}
.stats{display:flex;gap:16px;margin-top:12px;}
.stat{display:flex;flex-direction:column;}
.stat-n{font-family:'DM Serif Display',serif;font-size:26px;color:var(--blue);line-height:1;}
.stat-l{font-size:11px;color:var(--ink3);font-family:'DM Mono',monospace;}

.controls{display:flex;flex-direction:column;gap:10px;margin-bottom:1.5rem;}
.search-wrap{position:relative;}
.search-wrap input{width:100%;padding:10px 14px 10px 38px;font-size:14px;font-family:'DM Sans',sans-serif;border:1px solid var(--rule);border-radius:var(--rs);background:var(--surface);color:var(--ink);outline:none;transition:border-color .15s;}
.search-wrap input:focus{border-color:var(--blue);}
.search-icon{position:absolute;left:12px;top:50%;transform:translateY(-50%);color:var(--ink3);font-size:15px;}
.filter-row{display:flex;gap:6px;flex-wrap:wrap;}
.fbtn{padding:5px 14px;font-size:12px;font-family:'DM Sans',sans-serif;border-radius:20px;border:1px solid var(--rule);background:var(--surface);color:var(--ink2);cursor:pointer;transition:all .15s;font-weight:500;}
.fbtn:hover{border-color:var(--blue);color:var(--blue);}
.fbtn.on{background:var(--blue);color:white;border-color:var(--blue);}

.mode-row{display:flex;gap:8px;align-items:center;}
.mode-label{font-size:12px;color:var(--ink3);font-family:'DM Mono',monospace;}
.mode-btn{padding:5px 14px;font-size:12px;font-family:'DM Sans',sans-serif;border-radius:20px;border:1px solid var(--rule);background:var(--surface);color:var(--ink2);cursor:pointer;transition:all .15s;font-weight:500;}
.mode-btn.on{background:var(--amber);color:white;border-color:var(--amber);}
.mode-btn:hover:not(.on){border-color:var(--amber);color:var(--amber);}

.list-header{display:grid;grid-template-columns:1fr 2fr 100px;gap:12px;padding:6px 14px;font-size:11px;font-weight:500;color:var(--ink3);letter-spacing:0.06em;text-transform:uppercase;font-family:'DM Mono',monospace;margin-bottom:4px;}

.vocab-item{background:var(--surface);border:1px solid var(--rule);border-radius:var(--rs);margin-bottom:6px;overflow:hidden;transition:box-shadow .15s;}
.vocab-item:hover{box-shadow:0 2px 8px rgba(0,0,0,0.07);}

.vocab-main{display:grid;grid-template-columns:1fr 2fr 100px;gap:12px;align-items:start;padding:12px 14px;cursor:pointer;}
.learn-mode .vocab-main{grid-template-columns:1fr auto;}

.vocab-term{font-weight:500;font-size:15px;color:var(--ink);}
.vocab-abbr{font-size:11px;font-family:'DM Mono',monospace;color:var(--ink3);margin-top:2px;}

.vocab-def{font-size:14px;color:var(--ink2);line-height:1.6;}
.vocab-def.hidden{filter:blur(5px);user-select:none;transition:filter .25s;}
.vocab-def.hidden:hover{filter:blur(3px);}
.vocab-def.revealed{filter:none;}

.cat-pill{font-size:11px;font-weight:500;padding:3px 10px;border-radius:20px;white-space:nowrap;align-self:start;text-align:center;}

.vocab-expand{display:none;padding:0 14px 14px;border-top:1px solid var(--rule);}
.vocab-expand.open{display:block;}
.expand-inner{padding-top:12px;display:flex;flex-direction:column;gap:8px;}
.expand-row{display:flex;gap:8px;font-size:13px;}
.expand-label{font-size:11px;font-weight:500;color:var(--ink3);text-transform:uppercase;letter-spacing:0.06em;font-family:'DM Mono',monospace;min-width:80px;padding-top:1px;}
.expand-val{color:var(--ink2);line-height:1.6;flex:1;}
.example-box{background:var(--bg);border-radius:var(--rs);padding:8px 12px;font-size:13px;color:var(--ink2);line-height:1.6;border-left:3px solid var(--blue);border-radius:0 var(--rs) var(--rs) 0;}

.reveal-btn{font-size:12px;font-family:'DM Sans',sans-serif;padding:4px 12px;background:var(--amber-lt);color:var(--amber);border:none;border-radius:20px;cursor:pointer;font-weight:500;white-space:nowrap;transition:all .15s;}
.reveal-btn:hover{background:var(--amber);color:white;}

.empty{text-align:center;padding:3rem;color:var(--ink3);font-size:14px;}

.add-section{margin-top:2rem;padding-top:1.5rem;border-top:1.5px solid var(--ink);}
.add-title{font-family:'DM Serif Display',serif;font-size:20px;margin-bottom:1rem;}
.add-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:10px;}
.add-grid input,.add-grid select,.add-full textarea,.add-full input{font-family:'DM Sans',sans-serif;font-size:14px;padding:9px 12px;border:1px solid var(--rule);border-radius:var(--rs);background:var(--surface);color:var(--ink);outline:none;width:100%;transition:border-color .15s;}
.add-grid input:focus,.add-grid select:focus,.add-full textarea:focus,.add-full input:focus{border-color:var(--blue);}
.add-full{margin-bottom:10px;}
.add-full textarea{resize:vertical;min-height:70px;line-height:1.6;}
.add-btn{width:100%;padding:10px;font-size:14px;font-weight:500;font-family:'DM Sans',sans-serif;background:var(--blue);color:white;border:none;border-radius:var(--rs);cursor:pointer;transition:background .15s;}
.add-btn:hover{background:var(--blue-dk);}

footer{text-align:center;margin-top:3rem;font-size:11px;color:var(--ink3);font-family:'DM Mono',monospace;}
</style>
</head>
<body>
<div class="app">

<header>
  <div class="header-top">
    <div>
      <h1>Fach<em>vokabular</em></h1>
      <p class="header-meta">PM · Scrum · KI · Digital · Fortbildung ChapterNext 2026</p>
    </div>
    <div class="stats">
      <div class="stat"><span class="stat-n" id="total-count">0</span><span class="stat-l">Begriffe</span></div>
      <div class="stat"><span class="stat-n" id="learned-count">0</span><span class="stat-l">Gelernt</span></div>
    </div>
  </div>
</header>

<div class="controls">
  <div class="search-wrap">
    <span class="search-icon">⌕</span>
    <input type="text" id="search" placeholder="Begriff suchen…" oninput="render()">
  </div>
  <div class="filter-row" id="filter-row"></div>
  <div class="mode-row">
    <span class="mode-label">Modus:</span>
    <button class="mode-btn on" id="mode-list" onclick="setMode('list')">Liste</button>
    <button class="mode-btn" id="mode-learn" onclick="setMode('learn')">Lernmodus</button>
  </div>
</div>

<div class="list-header" id="list-header">
  <span>Begriff</span><span>Definition</span><span>Kategorie</span>
</div>

<div id="vocab-list"></div>

<div class="add-section">
  <div class="add-title">Begriff hinzufügen</div>
  <div class="add-grid">
    <input type="text" id="new-term" placeholder="Begriff (z.B. Velocity)" />
    <input type="text" id="new-abbr" placeholder="Abkürzung (optional)" />
  </div>
  <div class="add-full">
    <textarea id="new-def" placeholder="Definition / Erklärung…"></textarea>
  </div>
  <div class="add-grid">
    <input type="text" id="new-example" placeholder="Praxisbeispiel (optional)" />
    <select id="new-cat">
      <option value="pm">Projektmanagement</option>
      <option value="scrum">Scrum / Agile</option>
      <option value="ki">KI / Algorithmen</option>
      <option value="digital">Digital / Tools</option>
    </select>
  </div>
  <button class="add-btn" onclick="addTerm()">+ Begriff hinzufügen</button>
</div>

<footer id="footer-date"></footer>
</div>

<script>
var CATS = {
  pm:      { label:'Projektmgmt', bg:'#E8F0FB', tx:'#0E3261' },
  scrum:   { label:'Scrum/Agile', bg:'#EEEDFE', tx:'#3C3489' },
  ki:      { label:'KI',          bg:'#E8F5EE', tx:'#1C5C38' },
  digital: { label:'Digital',     bg:'#E3F5EE', tx:'#085041' }
};

var vocab = [
  { id:1,  term:'Algorithmus',           abbr:'',     cat:'ki',      def:'Endliche, eindeutige Folge von Anweisungen, die ein Problem schrittweise löst. Merkmale: Terminiertheit, Eindeutigkeit, Ausführbarkeit.', example:'MYCIN: regelbasierter medizinischer Algorithmus – Wenn Bakterientyp X UND Merkmal Y → empfehle Antibiotikum Z.', learned:false, open:false },
  { id:2,  term:'Neuronales Netz',        abbr:'NN',   cat:'ki',      def:'KI-Modell nach Vorbild des menschlichen Gehirns: Neuronen stimmen sich untereinander ab und erkennen Muster aus Trainingsdaten.', example:'Gesichtserkennung am Smartphone: wertet Augenabstand, Stirnform, Ohrform aus.', learned:false, open:false },
  { id:3,  term:'Large Language Model',   abbr:'LLM',  cat:'ki',      def:'Großes Sprachmodell, das auf Basis statistischer Muster in Milliarden Texten trainiert wurde und Sprache generiert.', example:'Claude, ChatGPT, Gemini sind LLMs.', learned:false, open:false },
  { id:4,  term:'Halluzination',          abbr:'',     cat:'ki',      def:'Faktisch falsche Ausgabe eines LLMs, die überzeugend als korrekt präsentiert wird – ohne Täuschungsabsicht, sondern durch statistische Musterfolge.', example:'LLM nennt eine erfundene Gerichtsentscheidung mit korrektem Aktenzeichen-Format.', learned:false, open:false },
  { id:5,  term:'Bias',                   abbr:'',     cat:'ki',      def:'Systematische Verzerrung in KI-Modellen, die durch einseitige oder unrepräsentative Trainingsdaten entsteht.', example:'Gesichtserkennungssystem funktioniert schlechter bei dunklen Hautfarben, weil Trainingsdaten mehrheitlich helle Haut enthielten.', learned:false, open:false },
  { id:6,  term:'Prompt Engineering',     abbr:'',     cat:'digital', def:'Die Kunst, Anfragen an KI-Systeme so zu formulieren, dass optimale Ergebnisse entstehen – durch Kontext, Rolle, Format und Beispiele.', example:'Statt "Erkläre Scrum" besser: "Erkläre Scrum in 3 Sätzen für eine Office Managerin ohne PM-Erfahrung."', learned:false, open:false },
  { id:7,  term:'System Prompt',          abbr:'',     cat:'digital', def:'Dauerhafte Hintergrundanweisung an einen KI-Assistenten, die bei jeder Konversation automatisch aktiv ist.', example:'Projektanweisung in Claude: "Hebe PM-Begriffe fett hervor und erkläre sie beim ersten Vorkommen."', learned:false, open:false },
  { id:8,  term:'Artifact',               abbr:'',     cat:'digital', def:'In Claude: persistente, herunterladbare Datei (HTML, React, Code, Markdown), die im Chat erstellt wird und eigenständig nutzbar ist.', example:'Der Übungsordner (uebungen-ordner.html) ist ein Claude Artifact – eine vollständige interaktive Web-App.', learned:false, open:false },
  { id:9,  term:'Stakeholder',            abbr:'',     cat:'pm',      def:'Alle Personen oder Gruppen, die ein Projekt beeinflussen oder von dessen Ergebnissen betroffen sind.', example:'Bei einem IT-Projekt: Auftraggeber, Endnutzer, IT-Abteilung, Betriebsrat, Lieferanten.', learned:false, open:false },
  { id:10, term:'Projektstrukturplan',    abbr:'PSP/WBS', cat:'pm',   def:'Hierarchische Zerlegung aller Projektaufgaben und Liefergegenstände – das zentrale Planungsinstrument im klassischen PM.', example:'Projekt "Büroumzug" → Teilprojekte: Planung / Logistik / IT / Kommunikation.', learned:false, open:false },
  { id:11, term:'Meilenstein',            abbr:'MS',   cat:'pm',      def:'Wichtiger Zwischenziel-Termin im Projekt, der den Abschluss einer Phase oder ein bedeutendes Ergebnis markiert.', example:'MS 1: Lastenheft abgenommen. MS 2: Prototyp fertig. MS 3: Abnahme durch Kunden.', learned:false, open:false },
  { id:12, term:'Risikomanagement',       abbr:'',     cat:'pm',      def:'Systematisches Identifizieren, Bewerten und Steuern von Projektrisiken, um negative Auswirkungen zu minimieren.', example:'Risiko: "Schlüsselperson fällt aus" → Gegenmaßnahme: Stellvertreter benennen und einarbeiten.', learned:false, open:false },
  { id:13, term:'Deliverable',            abbr:'',     cat:'pm',      def:'Konkretes, messbares Projektergebnis, das dem Auftraggeber oder dem Team übergeben wird.', example:'Deliverables eines Website-Projekts: Konzept, Design, Code, Testbericht, Dokumentation.', learned:false, open:false },
  { id:14, term:'KPI',                    abbr:'Key Performance Indicator', cat:'pm', def:'Messbare Kennzahl zur Bewertung des Fortschritts oder Erfolgs eines Projekts oder Prozesses.', example:'Projektfortschritt: 60% der Aufgaben abgeschlossen. Qualität: < 5 Bugs pro Release.', learned:false, open:false },
  { id:15, term:'ROI',                    abbr:'Return on Investment', cat:'pm', def:'Verhältnis von Nutzen zu Aufwand – wie viel Ertrag bringt eine Investition im Verhältnis zu den Kosten?', example:'KI-Tool kostet 200€/Monat, spart 8h Arbeit/Monat à 50€ = 400€ Ersparnis → ROI = +100%.', learned:false, open:false },
  { id:16, term:'Scrum',                  abbr:'',     cat:'scrum',   def:'Agiles Rahmenwerk für iterative Projektarbeit in festen Zeitabschnitten (Sprints) mit klar definierten Rollen, Artefakten und Events.', example:'Software-Team entwickelt in 2-Wochen-Sprints neue Features und passt den Plan nach jedem Sprint an.', learned:false, open:false },
  { id:17, term:'Sprint',                 abbr:'',     cat:'scrum',   def:'Fester Zeitblock von 1–4 Wochen, in dem ein Scrum-Team ein definiertes Ziel umsetzt. Herzstück des Scrum-Frameworks.', example:'Sprint 1 (2 Wochen): Login-Funktion implementieren und testen.', learned:false, open:false },
  { id:18, term:'Product Backlog',        abbr:'',     cat:'scrum',   def:'Priorisierte Liste aller offenen Anforderungen, Features und Aufgaben für ein Produkt – gepflegt vom Product Owner.', example:'Backlog-Einträge: "Passwort-Reset-Funktion", "Mobile Ansicht", "Export als PDF".', learned:false, open:false },
  { id:19, term:'Sprint Backlog',         abbr:'',     cat:'scrum',   def:'Teilmenge des Product Backlogs, die das Team für den aktuellen Sprint ausgewählt hat – der konkrete Arbeitsplan.', example:'Sprint Backlog Sprint 3: 8 User Stories mit insgesamt 34 Story Points.', learned:false, open:false },
  { id:20, term:'Product Owner',          abbr:'PO',   cat:'scrum',   def:'Scrum-Rolle: verantwortlich für das Product Backlog, priorisiert Anforderungen und vertritt die Interessen der Stakeholder.', example:'PO entscheidet: Mobile Ansicht hat höhere Priorität als Export-Funktion.', learned:false, open:false },
  { id:21, term:'Scrum Master',           abbr:'SM',   cat:'scrum',   def:'Scrum-Rolle: Coach und Moderator, der das Team bei der Anwendung von Scrum unterstützt und Hindernisse beseitigt.', example:'SM organisiert alle Scrum-Events und schützt das Team vor externen Störungen.', learned:false, open:false },
  { id:22, term:'Sprint Planning',        abbr:'',     cat:'scrum',   def:'Scrum-Event zu Beginn jedes Sprints: Team und PO planen gemeinsam, welche Backlog-Einträge im Sprint umgesetzt werden.', example:'Sprint Planning dauert max. 8h für einen Monatssprint: Ziel definieren + Aufgaben aufteilen.', learned:false, open:false },
  { id:23, term:'Daily Scrum',            abbr:'',     cat:'scrum',   def:'Tägliches 15-Minuten-Meeting des Entwicklungsteams zur Synchronisation: Was habe ich getan? Was tue ich heute? Was blockiert mich?', example:'"Gestern: Login fertig. Heute: Passwort-Reset. Blockiert: API-Dokumentation fehlt noch."', learned:false, open:false },
  { id:24, term:'Sprint Review',          abbr:'',     cat:'scrum',   def:'Scrum-Event am Sprint-Ende: Team präsentiert die fertigen Ergebnisse den Stakeholdern und sammelt Feedback.', example:'Sprint Review: Demo der neuen Mobile-Ansicht vor Product Owner und Kunden.', learned:false, open:false },
  { id:25, term:'Sprint Retrospective',   abbr:'Retro', cat:'scrum',  def:'Scrum-Event nach dem Review: Team reflektiert die Zusammenarbeit und leitet Verbesserungen ab (nicht das Produkt, sondern den Prozess).', example:'"Was lief gut? Was verbessern wir? → Nächster Sprint: täglich kurze Code-Reviews."', learned:false, open:false },
  { id:26, term:'Definition of Done',     abbr:'DoD',  cat:'scrum',   def:'Gemeinsam vereinbarte Kriterien, wann eine Aufgabe oder ein Increment wirklich als abgeschlossen gilt.', example:'DoD: Code geschrieben + getestet + reviewed + dokumentiert + deployed.', learned:false, open:false },
  { id:27, term:'Velocity',               abbr:'',     cat:'scrum',   def:'Maß für die durchschnittliche Arbeitsgeschwindigkeit eines Scrum-Teams – wie viele Story Points werden pro Sprint abgeschlossen?', example:'Team schließt durchschnittlich 32 Story Points pro Sprint ab → Velocity = 32.', learned:false, open:false },
  { id:28, term:'Servant Leadership',     abbr:'',     cat:'scrum',   def:'Führungsprinzip im Scrum: Die Führungskraft dient dem Team – schafft optimale Bedingungen statt Anweisungen zu geben.', example:'Scrum Master beseitigt Blockaden, moderiert Konflikte, schützt das Team vor Ablenkungen.', learned:false, open:false },
  { id:29, term:'Kanban',                 abbr:'',     cat:'scrum',   def:'Agile Methode zur Visualisierung von Arbeitsflüssen auf einem Board mit Spalten (To Do / In Progress / Done).', example:'Kanban-Board für Redaktion: Artikel-Ideen → In Bearbeitung → Lektorat → Veröffentlicht.', learned:false, open:false },
  { id:30, term:'Digital Literacy',       abbr:'',     cat:'digital', def:'Fähigkeit, digitale Technologien kompetent, kritisch und verantwortungsvoll zu nutzen – inkl. Verständnis ihrer gesellschaftlichen Auswirkungen.', example:'Digital Literacy 2.0: KI nicht nur nutzen, sondern ihren ökologischen Fußabdruck kritisch einordnen.', learned:false, open:false },
  { id:31, term:'DSGVO',                  abbr:'Datenschutz-Grundverordnung', cat:'digital', def:'EU-Verordnung zum Schutz personenbezogener Daten – regelt, wie Unternehmen Daten erheben, speichern und verarbeiten dürfen.', example:'Keine Namen oder Adressen von Kunden in öffentliche KI-Tools eingeben ohne Prüfung.', learned:false, open:false },
  { id:32, term:'Hybrides Projektmgmt',   abbr:'',     cat:'pm',      def:'Kombination aus klassischen (Wasserfall) und agilen (Scrum/Kanban) Methoden – je nach Projektphase und Anforderung.', example:'Planungsphase klassisch mit PSP, Umsetzungsphase agil in Sprints.', learned:false, open:false },
  { id:33, term:'GitHub',                  abbr:'',     cat:'digital', def:'Webbasierte Plattform zur Versionskontrolle und Zusammenarbeit an Code-Projekten – basiert auf Git. Ermöglicht Änderungshistorie, Zusammenarbeit und kostenloses Webhosting.', example:'Lovable speichert generierten Homepage-Code automatisch auf GitHub – von dort per GitHub Pages veröffentlichen.', learned:false, open:false },
  { id:34, term:'Git',                     abbr:'',     cat:'digital', def:'Versionskontrollsystem, das alle Änderungen an Dateien nachverfolgt und es ermöglicht, jederzeit auf frühere Versionen zurückzukehren.', example:'Wie ein "Rückgängig"-Button für ganze Projekte – mit kompletter Änderungshistorie wer wann was geändert hat.', learned:false, open:false },
  { id:35, term:'Repository',              abbr:'Repo', cat:'digital', def:'Zentraler Speicherort für alle Projektdateien inkl. vollständiger Änderungshistorie – das Herzstück von GitHub.', example:'Ein Repo für den Übungsordner: alle HTML-Tools, Änderungen nachvollziehbar, jederzeit wiederherstellbar.', learned:false, open:false },
  { id:36, term:'GitHub Pages',            abbr:'',     cat:'digital', def:'Kostenloses Webhosting direkt aus einem GitHub-Repository – ohne Server, ohne Kosten, eigene URL inklusive.', example:'Lovable-Homepage aus dem Repository → per GitHub Pages unter eigenem Link weltweit erreichbar.', learned:false, open:false },
  { id:37, term:'Lovable',                 abbr:'',     cat:'digital', def:'KI-Tool zur Generierung vollständiger Web-Apps und Homepages aus natürlichsprachigen Beschreibungen – ohne Programmierkenntnisse nötig.', example:'Homepage für Bewerbungsportfolio in wenigen Minuten generiert – Code landet automatisch auf GitHub.', learned:false, open:false }
];

var nextId = vocab.length + 1;
var activeFilter = 'all';
var activeMode = 'list';
var learnedSet = JSON.parse(localStorage.getItem('vocab-learned') || '[]');
vocab.forEach(function(v){ v.learned = learnedSet.indexOf(v.id) > -1; });

function getCat(id){ return CATS[id] || {label:id, bg:'#F1F0EC', tx:'#444441'}; }

function today(){
  var d = new Date();
  return d.getDate()+'.'+(d.getMonth()+1)+'.'+d.getFullYear();
}

function setMode(m){
  activeMode = m;
  document.getElementById('mode-list').className  = 'mode-btn' + (m==='list'  ? ' on' : '');
  document.getElementById('mode-learn').className = 'mode-btn' + (m==='learn' ? ' on' : '');
  document.getElementById('list-header').style.display = m==='list' ? 'grid' : 'none';
  render();
}

function sf(f){ activeFilter = f; render(); }

function toggleOpen(id){
  vocab = vocab.map(function(v){ return v.id===id ? Object.assign({},v,{open:!v.open}) : v; });
  render();
}

function toggleLearned(id){
  vocab = vocab.map(function(v){ return v.id===id ? Object.assign({},v,{learned:!v.learned}) : v; });
  learnedSet = vocab.filter(function(v){return v.learned;}).map(function(v){return v.id;});
  localStorage.setItem('vocab-learned', JSON.stringify(learnedSet));
  render();
}

function reveal(id){
  var el = document.getElementById('def-'+id);
  if(el){ el.classList.remove('hidden'); el.classList.add('revealed'); }
  var btn = document.getElementById('rev-btn-'+id);
  if(btn){ btn.style.display='none'; }
}

function render(){
  var q = document.getElementById('search').value.toLowerCase().trim();
  var filtered = vocab.filter(function(v){
    var catOk = activeFilter==='all' || v.cat===activeFilter;
    var searchOk = !q || v.term.toLowerCase().includes(q) || v.def.toLowerCase().includes(q) || (v.abbr&&v.abbr.toLowerCase().includes(q));
    return catOk && searchOk;
  });

  var learned = vocab.filter(function(v){return v.learned;}).length;
  document.getElementById('total-count').textContent = vocab.length;
  document.getElementById('learned-count').textContent = learned;
  document.getElementById('footer-date').textContent = 'vokabelliste.html · Stand: '+today()+' · '+vocab.length+' Begriffe';

  renderFilters();

  var el = document.getElementById('vocab-list');
  if(!filtered.length){
    el.innerHTML = '<div class="empty">Keine Begriffe gefunden.</div>';
    return;
  }

  el.innerHTML = filtered.map(function(v){
    var c = getCat(v.cat);
    var isLearn = activeMode === 'learn';

    var mainGrid = isLearn
      ? '<div class="vocab-main" onclick="toggleOpen('+v.id+')">'
        + '<div><div class="vocab-term">'+escHtml(v.term)+'</div>'+(v.abbr?'<div class="vocab-abbr">'+escHtml(v.abbr)+'</div>':'')+' </div>'
        + '<div style="display:flex;gap:8px;align-items:center">'
        + '<button class="reveal-btn" id="rev-btn-'+v.id+'" onclick="event.stopPropagation();reveal('+v.id+')"'+(v.open?'style="display:none"':'')+'>Definition aufdecken</button>'
        + '<span class="cat-pill" style="background:'+c.bg+';color:'+c.tx+'">'+c.label+'</span>'
        + '<button onclick="event.stopPropagation();toggleLearned('+v.id+')" style="background:'+(v.learned?'#E8F5EE':'transparent')+';border:1px solid '+(v.learned?'#1E6B42':'var(--rule)')+';color:'+(v.learned?'#1E6B42':'var(--ink3)')+';padding:3px 10px;border-radius:20px;font-size:11px;font-weight:500;cursor:pointer;font-family:DM Sans,sans-serif;">'+(v.learned?'✓ Gelernt':'Gelernt?')+'</button>'
        + '</div>'
        + '</div>'
      : '<div class="vocab-main" onclick="toggleOpen('+v.id+')">'
        + '<div><div class="vocab-term">'+escHtml(v.term)+'</div>'+(v.abbr?'<div class="vocab-abbr">'+escHtml(v.abbr)+'</div>':'')+' </div>'
        + '<div class="vocab-def">'+escHtml(v.def)+'</div>'
        + '<span class="cat-pill" style="background:'+c.bg+';color:'+c.tx+'">'+c.label+'</span>'
        + '</div>';

    var defHtml = isLearn
      ? '<div class="vocab-def'+(v.open?' revealed':' hidden')+'" id="def-'+v.id+'">'+escHtml(v.def)+'</div>'
      : '';

    var expandHtml = '<div class="vocab-expand'+(v.open?' open':'')+'">'
      + '<div class="expand-inner">'
      + (isLearn ? defHtml : '')
      + (v.example ? '<div class="expand-row"><span class="expand-label">Beispiel</span><div class="example-box">'+escHtml(v.example)+'</div></div>' : '')
      + '<div class="expand-row"><span class="expand-label">Status</span>'
      + '<button onclick="toggleLearned('+v.id+')" style="background:'+(v.learned?'#E8F5EE':'transparent')+';border:1px solid '+(v.learned?'#1E6B42':'var(--rule)')+';color:'+(v.learned?'#1E6B42':'var(--ink3)')+';padding:4px 14px;border-radius:20px;font-size:12px;font-weight:500;cursor:pointer;font-family:DM Sans,sans-serif;">'+(v.learned?'✓ Als gelernt markiert':'Als gelernt markieren')+'</button>'
      + '</div>'
      + '</div></div>';

    return '<div class="vocab-item">'+mainGrid+expandHtml+'</div>';
  }).join('');
}

function renderFilters(){
  var bar = document.getElementById('filter-row');
  var counts = {all:vocab.length, pm:0, scrum:0, ki:0, digital:0};
  vocab.forEach(function(v){ if(counts[v.cat]!==undefined) counts[v.cat]++; });
  var html = '<button class="fbtn'+(activeFilter==='all'?' on':'')+'" onclick="sf(\'all\')">Alle ('+counts.all+')</button>';
  Object.keys(CATS).forEach(function(k){
    var c = CATS[k];
    html += '<button class="fbtn'+(activeFilter===k?' on':'')+'" onclick="sf(\''+k+'\')">'
      +'<span style="display:inline-block;width:7px;height:7px;border-radius:50%;background:'+c.tx+';margin-right:5px;"></span>'
      +c.label+' ('+counts[k]+')</button>';
  });
  bar.innerHTML = html;
}

function addTerm(){
  var term = document.getElementById('new-term').value.trim();
  var def  = document.getElementById('new-def').value.trim();
  if(!term || !def){ alert('Bitte Begriff und Definition eingeben.'); return; }
  var abbr    = document.getElementById('new-abbr').value.trim();
  var example = document.getElementById('new-example').value.trim();
  var cat     = document.getElementById('new-cat').value;
  vocab.push({ id:nextId++, term:term, abbr:abbr, cat:cat, def:def, example:example, learned:false, open:false });
  document.getElementById('new-term').value='';
  document.getElementById('new-abbr').value='';
  document.getElementById('new-def').value='';
  document.getElementById('new-example').value='';
  render();
}

function escHtml(s){ return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

document.getElementById('footer-date').textContent = 'vokabelliste.html · Stand: '+today();
render();
</script>
</body>
</html>
